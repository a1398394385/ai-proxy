# ═══════════════════════════════════════════════════════════════════════
# AI Proxy & Hermes Data Browser 配置
# ═══════════════════════════════════════════════════════════════════════
#
# 模型路由已由 ConfigDB（data db 的 upstreams/target_models/model_routes 表）
# 动态管理，不再使用静态 model_map。通过 POST /admin/reload 热重载。
#

# ─── Proxy 服务绑定 ────────────────────────────────────────────────────
proxy:
  host: "127.0.0.1"
  port: 48743
  log_level: "INFO"  # DEBUG / INFO / WARNING

# ─── 服务端口注册 ──────────────────────────────────────────────────────
# data_browser: Hermes Data Browser 监听地址
#（codex_proxy 已在 proxy 段声明，此处不再重复）
ports:
  data_browser:
    host: "127.0.0.1"
    port: 18742

# ─── 日志配置 ───────────────────────────────────────────────────────────
logging:
  debug_retention_days: 3
  log_dir: "~/.ai-agent-tools/data"
  log_file: "access_log.db"

# ─── Response Store（response_id 缓存，支持多轮对话）───────────────────
response_store:
  max_entries: 3000
  ttl_seconds: 43200    # 12 小时
