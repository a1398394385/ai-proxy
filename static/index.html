<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Data Browser</title>
<link rel="stylesheet" href="css/base.css">
<style>
/* KPI 卡片网格 */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  .kpi-grid { grid-template-columns: 1fr; }
}

.kpi-card {
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px -4px rgba(0, 0, 0, 0.2);
  border-color: hsl(var(--primary) / 0.3);
}

.kpi-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.kpi-label {
  font-size: 12px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.kpi-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.kpi-icon.blue { background: hsl(var(--blue) / 0.15); color: hsl(var(--blue)); }
.kpi-icon.green { background: hsl(var(--green) / 0.15); color: hsl(var(--green)); }
.kpi-icon.orange { background: hsl(var(--orange) / 0.15); color: hsl(var(--orange)); }
.kpi-icon.purple { background: hsl(var(--purple) / 0.15); color: hsl(var(--purple)); }
.kpi-icon.cyan { background: hsl(var(--cyan) / 0.15); color: hsl(var(--cyan)); }
.kpi-icon.red { background: hsl(var(--red) / 0.15); color: hsl(var(--red)); }

.kpi-value {
  font-size: 28px;
  font-weight: 700;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

.kpi-value.blue { color: hsl(var(--blue)); }
.kpi-value.green { color: hsl(var(--green)); }
.kpi-value.orange { color: hsl(var(--orange)); }
.kpi-value.purple { color: hsl(var(--purple)); }
.kpi-value.cyan { color: hsl(var(--cyan)); }
.kpi-value.red { color: hsl(var(--red)); }

.kpi-sub {
  font-size: 12px;
  color: hsl(var(--muted-foreground));
}

/* KPI Breakdown - Token 汇总卡片 */
.kpi-breakdown {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid hsl(var(--border));
}

.kpi-breakdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.kpi-breakdown-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.kpi-breakdown-dot.blue { background: hsl(var(--blue)); }
.kpi-breakdown-dot.green { background: hsl(var(--green)); }

.kpi-breakdown-label {
  color: hsl(var(--muted-foreground));
  min-width: 45px;
}

.kpi-breakdown-value {
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  margin-left: auto;
}

.kpi-breakdown-value.blue { color: hsl(var(--blue)); }
.kpi-breakdown-value.green { color: hsl(var(--green)); }

/* KPI Cache - Cache 汇总卡片 */
.kpi-cache-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 8px;
}

.kpi-cache-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: hsl(var(--secondary));
  border-radius: 8px;
  border: 1px solid hsl(var(--border));
}

.kpi-cache-label {
  font-size: 12px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.kpi-cache-value {
  font-size: 16px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.kpi-cache-value.orange { color: hsl(var(--orange)); }
.kpi-cache-value.purple { color: hsl(var(--purple)); }

/* 图表卡片 */
.chart-card {
  composes: glass-card;
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.chart-title {
  font-size: 14px;
  font-weight: 600;
  color: hsl(var(--foreground));
}

.chart-container {
  height: 300px;
  position: relative;
  overflow: hidden;
}

/* SVG 面积图样式 */
.area-chart {
  width: 100%;
  height: 100%;
  display: block;
}

.area-chart-grid {
  stroke: hsl(var(--border));
  stroke-dasharray: 3 3;
  opacity: 0.4;
}

.area-chart-axis {
  stroke: hsl(var(--border));
  opacity: 0.3;
}

.area-chart-tick {
  fill: hsl(var(--muted-foreground));
  font-size: 11px;
  font-family: 'Inter', system-ui, sans-serif;
}

.area-path-input {
  fill: url(#gradientInput);
  stroke: #3b82f6;
  stroke-width: 2;
}

.area-path-output {
  fill: url(#gradientOutput);
  stroke: #22c55e;
  stroke-width: 2;
}

.area-path-cache-read {
  fill: url(#gradientCacheRead);
  stroke: #a855f7;
  stroke-width: 2;
}

.area-path-cache-write {
  fill: url(#gradientCacheWrite);
  stroke: #f97316;
  stroke-width: 2;
}

.area-path-cost {
  fill: none;
  stroke: #f43f5e;
  stroke-width: 2;
}

/* 图例 */
.chart-legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid hsl(var(--border));
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: hsl(var(--muted-foreground));
  cursor: pointer;
  transition: opacity 0.15s ease;
}

.legend-item:hover {
  opacity: 0.8;
}

.legend-item.hidden {
  opacity: 0.4;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.legend-dot.input { background: #3b82f6; }
.legend-dot.output { background: #22c55e; }
.legend-dot.cache-read { background: #a855f7; }
.legend-dot.cache-write { background: #f97316; }

/* Tooltip */
.chart-tooltip {
  position: absolute;
  background: hsl(var(--card) / 0.95);
  border: 1px solid hsl(var(--border));
  border-radius: 8px;
  padding: 12px 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
  z-index: 100;
  min-width: 180px;
}

.chart-tooltip.show {
  opacity: 1;
}

.tooltip-title {
  font-size: 13px;
  font-weight: 600;
  color: hsl(var(--foreground));
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid hsl(var(--border));
}

.tooltip-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  font-size: 12px;
  margin: 4px 0;
}

.tooltip-label {
  display: flex;
  align-items: center;
  gap: 6px;
  color: hsl(var(--muted-foreground));
}

.tooltip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.tooltip-value {
  font-weight: 600;
  font-family: 'Inter', system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
}

/* 表格卡片 */
.table-card {
  composes: glass-card;
  overflow: hidden;
  max-width: 100%;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid hsl(var(--border));
}

.table-title {
  font-size: 14px;
  font-weight: 600;
}

.table-scroll {
  overflow-x: auto;
  max-width: 100%;
}

.table-scroll::-webkit-scrollbar {
  height: 6px;
}

.table-scroll::-webkit-scrollbar-track {
  background: hsl(var(--secondary));
}

.table-scroll::-webkit-scrollbar-thumb {
  background: hsl(var(--border));
  border-radius: 3px;
}

.table-scroll::-webkit-scrollbar-thumb:hover {
  background: hsl(var(--muted-foreground));
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 12px 16px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: hsl(var(--secondary));
  border-bottom: 1px solid hsl(var(--border));
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid hsl(var(--border));
  color: hsl(var(--foreground));
}

tr:hover td {
  background: hsl(var(--muted) / 0.5);
}

/* Fact Store 特定样式 */
.fact-card {
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.fact-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px -4px rgba(0, 0, 0, 0.2);
  border-color: hsl(var(--primary) / 0.3);
}

.fact-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.fact-id {
  font-size: 12px;
  font-weight: 600;
  color: hsl(var(--primary));
  font-family: monospace;
  min-width: 50px;
}

.fact-content {
  flex: 1;
  line-height: 1.6;
  color: hsl(var(--foreground));
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 120px;
  overflow: hidden;
  position: relative;
  transition: max-height 0.3s ease;
}

.fact-content.expanded {
  max-height: none;
}

.fact-content.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(transparent, hsl(var(--card)));
  pointer-events: none;
}

.fact-expand-btn {
  margin-top: 8px;
  padding: 4px 12px;
  font-size: 12px;
  color: hsl(var(--primary));
  background: transparent;
  border: 1px solid hsl(var(--border));
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
  align-self: flex-start;
}

.fact-expand-btn:hover {
  background: hsl(var(--primary) / 0.1);
  border-color: hsl(var(--primary) / 0.3);
}

.fact-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.fact-actions {
  display: flex;
  gap: 8px;
}
</style>
</head>
<body>
<div class="app">
  <!-- 导航栏 -->
  <nav class="top-nav">
    <div class="nav-brand">
      <div class="nav-brand-icon">🔬</div>
      <span>Hermes Data Browser</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="facts">
        <span>📋</span> Fact Store
      </button>
      <button class="nav-tab" data-page="tokens">
        <span>📊</span> Token 统计
      </button>
      <button class="nav-tab" data-page="models">
        <span>🔌</span> 模型管理
      </button>
    </div>
    <div class="nav-actions">
      <button class="toolbar-btn" id="settings-btn" title="设置">&#x2699;</button>
      <button class="toolbar-btn" id="theme-toggle">&#x1F319;</button>
    </div>
  </nav>

  <!-- Fact Store 页面 -->
  <div id="page-facts" class="main-content">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search" placeholder="搜索事实内容、标签...">
      </div>
      <div class="filter-pills" id="cat-filters"></div>
      <button class="btn btn-primary" id="add-btn" style="margin-left:auto">
        <span>+</span> 新增事实
      </button>
    </div>
    <div id="facts-container"></div>
  </div>

  <!-- Token 统计页面 -->
  <div id="page-tokens" class="main-content hidden">
    <!-- 周期切换 -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn period-btn" data-period="day">24小时</button>
        <button class="toolbar-btn period-btn active" data-period="week">7天</button>
        <button class="toolbar-btn period-btn" data-period="month">30天</button>
      </div>
      <div class="search-box">
        <input type="text" id="model-search" placeholder="搜索模型...">
      </div>
      <button class="btn btn-secondary" id="refresh-token" style="margin-left:auto">
        <span>🔄</span> 刷新
      </button>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-grid" id="kpi-container">
      <!-- 动态填充 -->
    </div>

    <!-- 图表 -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">📈 使用趋势</span>
        <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="chart-period-label">过去 7 天</span>
      </div>
      <div class="chart-container" id="chart-wrapper">
        <svg class="area-chart" id="trend-chart" preserveAspectRatio="none">
          <defs>
            <linearGradient id="gradientInput" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#3b82f6" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#3b82f6" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientOutput" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#22c55e" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#22c55e" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientCacheRead" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#a855f7" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#a855f7" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientCacheWrite" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#f97316" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#f97316" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- 网格线 -->
          <g id="chart-grid"></g>
          <!-- 路径 -->
          <g id="chart-areas"></g>
          <!-- 坐标轴 -->
          <g id="chart-axes"></g>
          <!-- 鼠标移动竖线 -->
          <line id="chart-cursor-line" x1="0" y1="0" x2="0" y2="100%" stroke="hsl(var(--muted-foreground) / 0.5)" stroke-width="1" stroke-dasharray="4 4" style="display:none; pointer-events:none;"/>
          <!-- 交互区域 -->
          <rect id="chart-overlay" width="100%" height="100%" fill="transparent"/>
        </svg>
        <!-- Tooltip -->
        <div class="chart-tooltip" id="chart-tooltip">
          <div class="tooltip-title" id="tooltip-title"></div>
          <div id="tooltip-content"></div>
        </div>
      </div>
      <!-- 图例 -->
      <div class="chart-legend" id="chart-legend">
        <div class="legend-item" data-series="inputTokens">
          <div class="legend-dot input"></div>
          <span>输入 Tokens</span>
        </div>
        <div class="legend-item" data-series="outputTokens">
          <div class="legend-dot output"></div>
          <span>输出 Tokens</span>
        </div>
        <div class="legend-item" data-series="cacheReadTokens">
          <div class="legend-dot cache-read"></div>
          <span>缓存读取</span>
        </div>
        <div class="legend-item" data-series="cacheWriteTokens">
          <div class="legend-dot cache-write"></div>
          <span>缓存写入</span>
        </div>
        <div class="legend-item" data-series="costLine">
          <div class="legend-dot" style="background:#f43f5e"></div>
          <span>估算成本 (右轴 $)</span>
        </div>
      </div>
    </div>

    <!-- 模型统计表格 -->
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">🧮 按模型统计</span>
        <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="model-count"></span>
      </div>
      <div class="table-scroll">
        <table id="model-table">
          <thead>
            <tr>
              <th>模型</th>
              <th>请求次数</th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--blue));display:inline-block"></span>Input</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--green));display:inline-block"></span>Output</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--orange));display:inline-block"></span>Cache Read</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--purple));display:inline-block"></span>Cache Create</span></th>
              <th>总计</th>
              <th>占比</th>
              <th>成本</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 模型管理页面 -->
  <div id="page-models" class="main-content hidden">
    <div class="config-status-bar" id="config-status" style="display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:16px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:var(--radius);font-size:12px;">
      <span id="status-proxy-indicator" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--red));display:inline-block;"></span>
      <span id="status-proxy-text">检查中...</span>
      <span style="margin-left:auto;color:hsl(var(--muted-foreground))" id="status-counts"></span>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">📡 上游配置</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="upstream-count"></span>
          <button class="btn btn-primary btn-sm" onclick="showUpstreamModal()">+ 新增上游</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="upstream-table">
          <thead><tr><th>状态</th><th>名称</th><th>地址</th><th>超时(s)</th><th>默认</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">🤖 目标模型</span>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="model-filter-upstream" style="padding:4px 8px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));color:hsl(var(--foreground));font-size:12px;"><option value="">全部上游</option></select>
          <button class="btn btn-primary btn-sm" onclick="showModelModal()">+ 新增模型</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="model-table">
          <thead><tr><th>模型名</th><th>所属上游</th><th>Format</th><th>Multimodal</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">🔀 路由映射</span>
        <button class="btn btn-primary btn-sm" onclick="showRouteModal()">+ 新增路由</button>
      </div>
      <div class="table-scroll">
        <table id="route-table">
          <thead><tr><th>源模型</th><th>→ 目标模型</th><th>上游</th><th>状态</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:16px;">
      <button class="btn btn-primary" id="apply-config-btn" onclick="applyConfig()">✅ 应用配置</button>
    </div>
  </div>

  <!-- 设置页面 -->
  <div id="page-settings" class="main-content hidden">
    <div class="settings-container">
      <div class="settings-card">
        <div class="settings-header">
          <span class="settings-title">&#x2699; 通用设置</span>
        </div>
        <div class="settings-body">

<script>
// Inline script aliases for module exports (defined in js/core.js)
var currentPage = 'facts';
var currentPeriod = 'week';
var allFacts = [];
var allModels = [];
var activeCategory = null;
var editingId = null;
var chartData = [];
var hiddenSeries = new Set();

// Module function references (no fallback — module loads asynchronously, polled in boot)
var api = window.api;
var formatNumber = window.formatNumber;
var formatTokens = window.formatTokens;
var escHtml = window.escHtml;
var showModal = window.showModal;
var closeModal = window.closeModal;
var bus = window.bus;

// Module functions used in DOMContentLoaded handlers (defensive stubs)
var toggleTheme = window.toggleTheme || function() {};
var showSettings = window.showSettings || function() {};
var saveDefaultPage = window.saveDefaultPage || function() {};
var initSettings = window.initSettings || function() {};

// 绑定设置相关事件
document.addEventListener('DOMContentLoaded', () => {
  // 主题切换按钮
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', toggleTheme);
  }
  
  // 设置按钮

  if (settingsBtn) {
    settingsBtn.addEventListener('click', showSettings);
  }
  
  // 默认页面选择器
  const defaultPageSelect = document.getElementById('default-page-select');
  if (defaultPageSelect) {
    defaultPageSelect.addEventListener('change', (e) => {
      saveDefaultPage(e.target.value);
    });
  }
  
  // 默认周期选择器
  const defaultPeriodSelect = document.getElementById('default-period-select');
  if (defaultPeriodSelect) {
    defaultPeriodSelect.addEventListener('change', (e) => {
      localStorage.setItem('defaultPeriod', e.target.value);
    });
  }
  
  // 初始化设置
  initSettings();
});

// ===== API 调用 =====


// ===== 导航切换 =====
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const page = tab.dataset.page;
    currentPage = page;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-facts').classList.toggle('hidden', page !== 'facts');
    document.getElementById('page-tokens').classList.toggle('hidden', page !== 'tokens');
    document.getElementById('page-models').classList.toggle('hidden', page !== 'models');
    document.getElementById('page-settings').classList.add('hidden');
    if (page === 'facts') loadFacts();
    if (page === 'tokens') loadTokenStats();
    if (page === 'models') loadModelConfig();
  });
});

// ===== Fact Store =====
async function loadFacts(q) {
  let url = q ? `/api/facts?q=${encodeURIComponent(q)}` : '/api/facts';
  if (activeCategory && !q) url += `?category=${activeCategory}`;
  const data = await api(url);
  allFacts = data.facts || [];
  renderFacts(allFacts);
  if (!q && !activeCategory) loadCategories();
}

async function loadCategories() {
  const data = await api('/api/categories');
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = data.categories.map(c => {
    const label = catLabels[c.category] || c.category;
    const icon = catIcons[c.category] || '📌';
    return `<button class="filter-pill ${activeCategory === c.category ? 'active' : ''}" data-cat="${c.category}">${icon} ${label} (${c.count})</button>`;
  }).join('');
  wrap.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (activeCategory === cat) { activeCategory = null; }
      else { activeCategory = cat; }
      loadCategories();
      loadFacts();
    });
  });
}

function renderFacts(facts) {
  const c = document.getElementById('facts-container');
  if (!facts.length) { 
    c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>没有找到事实</p></div>'; 
    return; 
  }
  c.innerHTML = facts.map(f => {
    const catLabel = catLabels[f.category] || f.category;
    const catIcon = catIcons[f.category] || '📌';
    const trustPct = Math.round(f.trust_score * 100);
    const trustColor = trustPct >= 70 ? 'var(--green)' : trustPct >= 40 ? 'var(--orange)' : 'var(--red)';
    const entitiesHtml = (f.entities || []).map(e => `<span class="badge badge-blue">${e}</span>`).join(' ');
    const tagsHtml = f.tags ? f.tags.split(',').filter(Boolean).map(t => `<span class="badge" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground))">${t.trim()}</span>`).join(' ') : '';
    
    // 检测内容是否需要折叠（超过 5 行或 300 字符，与 CSS max-height: 120px 匹配）
    const content = f.content || '';
    const lineCount = content.split('\n').length;
    const charCount = content.length;
    // 按 1.6 行高、13px 字体计算，120px 约 5-6 行
    const needsExpand = lineCount > 5 || charCount > 300;
    const contentClass = needsExpand ? 'fact-content collapsed' : 'fact-content';
    const expandBtn = needsExpand ? `<button class="fact-expand-btn" onclick="toggleFactExpand(this)">展开 ▼</button>` : '';
    
    return `<div class="fact-card">
      <div class="fact-header">
        <span class="fact-id">#${f.fact_id}</span>
        <div style="flex:1;display:flex;flex-direction:column;min-width:0">
          <div class="${contentClass}" data-expanded="false">${escHtml(content)}</div>
          ${expandBtn}
        </div>
        <div class="fact-actions">
          <button class="btn btn-secondary btn-sm" onclick="editFact(${f.fact_id})">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteFact(${f.fact_id})">删除</button>
        </div>
      </div>
      <div class="fact-meta">
        <span class="badge badge-purple">${catIcon} ${catLabel}</span>
        ${tagsHtml}
        ${entitiesHtml}
        <span style="margin-left:auto;font-size:12px;color:hsl(var(--muted-foreground));display:flex;align-items:center;gap:6px">
          信任度
          <span style="display:inline-block;width:60px;height:4px;background:hsl(var(--muted));border-radius:2px;overflow:hidden">
            <span style="display:block;width:${trustPct}%;height:100%;background:hsl(${trustColor})"></span>
          </span>
          ${trustPct}%
        </span>
      </div>
    </div>`;
  }).join('');
}

// 展开/折叠 Fact 内容
function toggleFactExpand(btn) {
  const content = btn.previousElementSibling;
  const isExpanded = content.getAttribute('data-expanded') === 'true';
  
  if (isExpanded) {
    content.classList.remove('expanded');
    content.classList.add('collapsed');
    content.setAttribute('data-expanded', 'false');
    btn.textContent = '展开 ▼';
  } else {
    content.classList.remove('collapsed');
    content.classList.add('expanded');
    content.setAttribute('data-expanded', 'true');
    btn.textContent = '收起 ▲';
  }
}



// ===== Token 统计 =====
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPeriod = btn.dataset.period;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTokenStats();

});

document.getElementById('refresh-token').addEventListener('click', loadTokenStats);

async function loadTokenStats() {

  allModels = byModel.models || [];

  document.getElementById('chart-period-label').textContent = periodLabels[currentPeriod] || '7天';
  
  renderKPI(stats);
  renderTrendChart(trend.trends);

}

// ===== SVG 面积图实现 =====


function renderTrendChart(trends) {
  chartData = trends || [];
  if (!chartData.length) {
    document.getElementById('chart-areas').innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="hsl(var(--muted-foreground))">暂无数据</text>';
    return;
  }

  const svg = document.getElementById('trend-chart');
  const wrapper = document.getElementById('chart-wrapper');
  const width = wrapper.clientWidth;
  const height = wrapper.clientHeight;
  
  // 设置 SVG 视图框
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  
  // 边距
  const margin = { top: 10, right: 60, bottom: 30, left: 50 };
  const chartWidth = width - margin.left - margin.right;
  const chartHeight = height - margin.top - margin.bottom;
  
  // 向上取整到最接近的整数刻度
  function niceMax(max, ticks = 5) {
    if (max === 0) return 1;
    if (max < 10) return 10;
    const exponent = Math.floor(Math.log10(max));
    const fraction = max / Math.pow(10, exponent);
    let niceFraction;
    if (fraction <= 1.2) niceFraction = 1.2;
    else if (fraction <= 1.5) niceFraction = 1.5;
    else if (fraction <= 2) niceFraction = 2;
    else if (fraction <= 3) niceFraction = 3;
    else if (fraction <= 5) niceFraction = 5;
    else if (fraction <= 7) niceFraction = 7;
    else niceFraction = 10;
    return niceFraction * Math.pow(10, exponent);
  }

  // 使用各系列各自最大值（非堆叠）作为 Y 轴上界
  const maxIndividual = Math.max(
    ...chartData.map(d => Math.max(
      hiddenSeries.has('inputTokens')    ? 0 : (d.input_tokens      || 0),
      hiddenSeries.has('outputTokens')   ? 0 : (d.output_tokens     || 0),
      hiddenSeries.has('cacheReadTokens')  ? 0 : (d.cache_read_tokens  || 0),
      hiddenSeries.has('cacheWriteTokens') ? 0 : (d.cache_write_tokens || 0)
    )),
    1
  );
  const yMax = niceMax(maxIndividual);
  const yTicks = 5;
  
  // 绘制网格线
  const gridGroup = document.getElementById('chart-grid');
  gridGroup.innerHTML = '';
  for (let i = 0; i <= yTicks; i++) {
    const y = margin.top + (chartHeight * i / yTicks);
    const value = Math.round(yMax * (1 - i / yTicks));
    
    // 水平网格线
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', margin.left);
    line.setAttribute('y1', y);
    line.setAttribute('x2', width - margin.right);
    line.setAttribute('y2', y);
    line.setAttribute('class', 'area-chart-grid');
    gridGroup.appendChild(line);
  }
  
  // 绘制坐标轴
  const axesGroup = document.getElementById('chart-axes');
  axesGroup.innerHTML = '';
  
  // Y 轴标签（格式化为 k/M 格式）
  function formatAxisValue(value) {
    if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
    if (value >= 1000) return (value / 1000).toFixed(0) + 'k';
    return value.toString();
  }
  
  for (let i = 0; i <= yTicks; i++) {
    const y = margin.top + (chartHeight * i / yTicks);
    const value = Math.round(yMax * (1 - i / yTicks));
    
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', margin.left - 10);
    text.setAttribute('y', y + 4);
    text.setAttribute('text-anchor', 'end');
    text.setAttribute('class', 'area-chart-tick');
    text.textContent = formatAxisValue(value);
    axesGroup.appendChild(text);
  }

  // 右侧 Y 轴：成本（USD）
  const costValues = chartData.map(d => d.estimated_cost_usd || 0);
  const costYMax = niceMax(Math.max(...costValues, 0.0001));

  function formatCostAxis(v) {
    if (v === 0) return '$0';
    if (v >= 10)  return '$' + v.toFixed(1);
    if (v >= 1)   return '$' + v.toFixed(2);
    if (v >= 0.1) return '$' + v.toFixed(3);
    return '$' + v.toFixed(4);
  }

  // 右轴分隔线
  const rightLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  rightLine.setAttribute('x1', width - margin.right);
  rightLine.setAttribute('y1', margin.top);
  rightLine.setAttribute('x2', width - margin.right);
  rightLine.setAttribute('y2', margin.top + chartHeight);
  rightLine.setAttribute('class', 'area-chart-axis');
  axesGroup.appendChild(rightLine);

  // 右轴刻度标签
  for (let i = 0; i <= yTicks; i++) {
    const y = margin.top + (chartHeight * i / yTicks);
    const value = costYMax * (1 - i / yTicks);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', width - margin.right + 8);
    t.setAttribute('y', y + 4);
    t.setAttribute('text-anchor', 'start');
    t.setAttribute('class', 'area-chart-tick');
    t.setAttribute('fill', '#f43f5e');
    t.textContent = formatCostAxis(value);
    axesGroup.appendChild(t);
  }

  // X 轴标签 - 根据固定数量的数据点分布
  const xStep = chartWidth / (chartData.length - 1 || 1);
  const dataCount = chartData.length;
  
  let labelInterval;
  let labelFormatter;
  
  if (dataCount === 24) {
    // 24小时模式: 每个小时都显示标签，只显示时间（去掉日期）
    labelInterval = 1;
    labelFormatter = (d, i) => {
      // d.date 格式: "2026-04-22 11:31"
      const parts = d.date.split(' ');
      if (parts.length === 2) {
        return parts[1]; // 只返回 "11:31"
      }
      return d.date;
    };
  } else if (dataCount === 7) {
    // 7天模式: 每天都显示
    labelInterval = 1;
    labelFormatter = (d) => d.date.slice(5); // MM-DD
  } else if (dataCount === 30) {
    // 30天模式: 每5天显示一个标签
    labelInterval = 5;
    labelFormatter = (d) => d.date.slice(5); // MM-DD
  } else {
    // 其他情况自动计算
    labelInterval = Math.ceil(dataCount / 7);
    labelFormatter = (d) => d.date.slice(5);
  }
  
  chartData.forEach((d, i) => {
    // 对24小时模式，固定间隔显示标签，不过滤数据区域
    if (dataCount === 24) {
      if (i % labelInterval !== 0 && i !== dataCount - 1) {
        return;
      }
    }
    
    if (dataCount !== 24 && i % labelInterval !== 0 && i !== dataCount - 1) {
      return;
    }
    
    const x = margin.left + i * xStep;
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    
    // 对于最右侧的标签，调整位置避免截断
    let textAnchor = 'middle';
    let labelX = x;
    if (i === dataCount - 1) {
      // 最右侧标签往左偏移，防止截断
      labelX = Math.min(x, width - margin.right - 5);
      textAnchor = 'end';
    } else if (i === 0) {
      // 最左侧标签往右偏移
      textAnchor = 'start';
      labelX = Math.max(x, margin.left + 5);
    }
    
    text.setAttribute('x', labelX);
    text.setAttribute('y', height - 10);
    text.setAttribute('text-anchor', textAnchor);
    text.setAttribute('class', 'area-chart-tick');
    const label = labelFormatter(d, i);
    if (label) {
      text.textContent = label;
      axesGroup.appendChild(text);
    }
  });
  
  // 绘制面积路径（重叠式：每条系列从基线到自身值，最大系列先画确保在后面）
  const areasGroup = document.getElementById('chart-areas');
  areasGroup.innerHTML = '';

  const series = [
    { key: 'inputTokens',    label: '输入 Tokens', color: '#3b82f6', gradient: 'url(#gradientInput)',      class: 'area-path-input',       rawKey: 'input_tokens'       },
    { key: 'outputTokens',   label: '输出 Tokens', color: '#22c55e', gradient: 'url(#gradientOutput)',     class: 'area-path-output',      rawKey: 'output_tokens'      },
    { key: 'cacheReadTokens',  label: '缓存读取',  color: '#a855f7', gradient: 'url(#gradientCacheRead)',  class: 'area-path-cache-read',  rawKey: 'cache_read_tokens'  },
    { key: 'cacheWriteTokens', label: '缓存写入',  color: '#f97316', gradient: 'url(#gradientCacheWrite)', class: 'area-path-cache-write', rawKey: 'cache_write_tokens' }
  ];

  const chartBottom = margin.top + chartHeight;

  series.forEach((s) => {
    if (hiddenSeries.has(s.key)) return;

    const points = chartData.map((d, i) => {
      const x = margin.left + i * xStep;
      const value = d[s.rawKey] || 0;
      const y = margin.top + chartHeight * (1 - value / yMax);
      return { x, y };
    });

    // 构建路径: 顶部曲线 (左到右) → 右下角基线 → 左下角基线 → 闭合
    let pathD = '';
    points.forEach((p, i) => {
      if (i === 0) {
        pathD += `M ${p.x} ${p.y}`;
      } else {
        const prev = points[i - 1];
        const cpX = (prev.x + p.x) / 2;
        pathD += ` C ${cpX} ${prev.y}, ${cpX} ${p.y}, ${p.x} ${p.y}`;
      }
    });

    const last = points[points.length - 1];
    pathD += ` L ${last.x} ${chartBottom} L ${points[0].x} ${chartBottom} Z`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathD);
    path.setAttribute('class', s.class);
    path.setAttribute('fill', s.gradient);
    areasGroup.appendChild(path);
  });

  // 绘制成本折线（使用右侧 Y 轴刻度）
  if (!hiddenSeries.has('costLine')) {
    const costPoints = chartData.map((d, i) => ({
      x: margin.left + i * xStep,
      y: margin.top + chartHeight * (1 - (d.estimated_cost_usd || 0) / costYMax)
    }));
    let costD = '';
    costPoints.forEach((p, i) => {
      if (i === 0) {
        costD += `M ${p.x} ${p.y}`;
      } else {
        const prev = costPoints[i - 1];
        const cpX = (prev.x + p.x) / 2;
        costD += ` C ${cpX} ${prev.y}, ${cpX} ${p.y}, ${p.x} ${p.y}`;
      }
    });
    const costPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    costPath.setAttribute('d', costD);
    costPath.setAttribute('class', 'area-path-cost');
    areasGroup.appendChild(costPath);
  }

  // 图例交互
  document.querySelectorAll('.legend-item').forEach(item => {
    item.classList.toggle('hidden', hiddenSeries.has(item.dataset.series));
  });
  
  // 悬停交互
  const overlay = document.getElementById('chart-overlay');
  const tooltip = document.getElementById('chart-tooltip');
  const cursorLine = document.getElementById('chart-cursor-line');
  
  overlay.onmousemove = (e) => {
    const rect = svg.getBoundingClientRect();
    const x = e.clientX - rect.left - margin.left;
    const index = Math.round(x / xStep);
    
    if (index >= 0 && index < chartData.length) {
      const d = chartData[index];
      // 计算对齐到数据点的x坐标
      const pointX = margin.left + index * xStep;
      // 更新竖线位置
      cursorLine.setAttribute('x1', pointX);
      cursorLine.setAttribute('x2', pointX);
      cursorLine.style.display = 'block';
      showTooltip(e.clientX, e.clientY, d);
    }
  };
  
  overlay.onmouseleave = () => {
    tooltip.classList.remove('show');
    cursorLine.style.display = 'none';
  };
}

function showTooltip(mouseX, mouseY, data) {
  const tooltip = document.getElementById('chart-tooltip');
  const title = document.getElementById('tooltip-title');
  const content = document.getElementById('tooltip-content');
  
  // 根据数据格式判断显示方式
  const dataCount = chartData.length;
  if (dataCount === 24) {
    // 24小时模式: 显示完整日期时间 MM-DD HH:mm
    title.textContent = data.date; // 如 "2026-04-21 14:00"
  } else if (dataCount === 7 || dataCount === 30) {
    title.textContent = data.date; // 7天/30天模式: 显示日期
  } else {
    title.textContent = data.date;
  }
  
  const items = [
    { label: '输入 Tokens', value: data.input_tokens, color: '#3b82f6', key: 'inputTokens' },
    { label: '输出 Tokens', value: data.output_tokens, color: '#22c55e', key: 'outputTokens' },
    { label: '缓存读取', value: data.cache_read_tokens, color: '#a855f7', key: 'cacheReadTokens' },
    { label: '缓存写入', value: data.cache_write_tokens, color: '#f97316', key: 'cacheWriteTokens' },
    { label: '成本', value: '$' + data.estimated_cost_usd.toFixed(4), color: '#f43f5e', bold: true }
  ];
  
  content.innerHTML = items.filter(item => !item.key || !hiddenSeries.has(item.key)).map(item => `
    <div class="tooltip-row">
      <div class="tooltip-label">
        <div class="tooltip-dot" style="background:${item.color}"></div>
        <span>${item.label}</span>
      </div>
      <span class="tooltip-value" style="color:${item.bold ? 'hsl(var(--foreground))' : ''}">${typeof item.value === 'number' ? item.value.toLocaleString() : item.value}</span>
    </div>
  `).join('');
  
  // 定位 tooltip
  const rect = document.getElementById('chart-wrapper').getBoundingClientRect();
  let left = mouseX - rect.left + 15;
  let top = mouseY - rect.top - 10;

  // 先渲染出来，再读取实际尺寸
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.classList.add('show');

  // 水平边界：右侧放不下则翻到左边
  const tipW = tooltip.offsetWidth;
  if (left + tipW > rect.width) left = mouseX - rect.left - tipW - 15;
  // 垂直边界：底部放不下则翻到鼠标上方
  const tipH = tooltip.offsetHeight;
  if (top + tipH > rect.height) top = mouseY - rect.top - tipH - 10;
  // 防止超出顶部
  if (top < 0) top = 4;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

async function confirmDisableUpstream(id) {
  const data = await api('/api/upstreams');
  const u = data.upstreams.find(x => x.id === id);
  if (!u) return;
  const models = await api('/api/models?upstream_id=' + encodeURIComponent(id));
  const routes = await api('/api/routes');
  const affected = routes.routes.filter(r => r.upstream_id === id);
  const msg = '确认禁用上游 "' + id + '"？\n\n关联模型: ' + models.models.length + ' 个\n活跃路由引用: ' + affected.length + ' 个\n\n禁用后相关路由将无法使用。';
  if (!confirm(msg)) return;
  const result = await api('/api/upstreams/' + id, { method: 'DELETE' });
  if (result.error) {
    alert('❌ 无法禁用: ' + result.error + '\n\n被引用的路由: ' + (result.referenced_routes || []).join(', '));
  } else {
    bus.emit('config:upstream-changed', {});
    bus.emit('config:dirty', { source: 'upstream' });
    loadAllModelConfigTables();
  }
}

  if (result.error) {
    alert('❌ 无法删除: ' + result.error + '\n\n被引用的路由: ' + (result.referenced_routes || []).join(', '));
  } else {
    bus.emit('config:model-changed', {});
    bus.emit('config:dirty', { source: 'model' });
    loadAllModelConfigTables();
  }
}

// ─── 路由模态框 ───
async function showRouteModal(editId) {
  let data = { source: '', target_model_id: '' };
  let title = '新增路由';
  if (editId) {
    title = '编辑路由 #' + editId;
    const routes = await api('/api/routes');
    const found = routes.routes.find(r => r.id === editId);
    if (found) data = found;
  }
  const models = await api('/api/models');
  const byUpstream = {};
  models.models.forEach(m => {
    if (!byUpstream[m.upstream_name]) byUpstream[m.upstream_name] = [];
    byUpstream[m.upstream_name].push(m);
  });
  let modelOpts = '';
  for (const [upstream, mlist] of Object.entries(byUpstream)) {
    modelOpts += '<optgroup label="' + escHtml(upstream) + '">';
    mlist.forEach(m => { modelOpts += '<option value="' + m.id + '" ' + (data.target_model_id === m.id ? 'selected' : '') + '>' + escHtml(m.name) + '</option>'; });
    modelOpts += '</optgroup>';
  }
  showModal(title,
    `<div class="form-group"><label class="form-label">源模型名</label><input type="text" class="form-input" id="r-source" value="${escHtml(data.source)}" placeholder="如 gpt-4o 或 * (fallback)"></div>
     <div class="form-group"><label class="form-label">目标模型</label><select class="form-input" id="r-target">${modelOpts}</select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveRoute(${editId || 0})">保存</button>`);
}

async function saveRoute(editId) {
  const data = {
    source: document.getElementById('r-source').value.trim(),
    target_model_id: parseInt(document.getElementById('r-target').value),
  };
  if (!data.source) { alert('源模型名不能为空'); return; }
  if (editId) {
    await api('/api/routes/' + editId, { method: 'PUT', body: JSON.stringify(data) });
  } else {
    await api('/api/routes', { method: 'POST', body: JSON.stringify(data) });
  }
  closeModal();
  bus.emit('config:route-changed', {});
  bus.emit('config:dirty', { source: 'route' });
  loadAllModelConfigTables();
}

async function confirmDeleteRoute(id, source) {
  if (source === '*') {
    const routes = await api('/api/routes');
    const starCount = routes.routes.filter(r => r.source === '*').length;
    if (starCount <= 1) { alert('❌ 不能删除最后一条 * fallback 路由'); return; }
  }
  if (!confirm('确认删除路由 "' + source + '"？')) return;
  const result = await api('/api/routes/' + id, { method: 'DELETE' });
  if (result.error) { alert('❌ ' + result.error); }
  else { bus.emit('config:route-changed', {}); bus.emit('config:dirty', { source: 'route' }); loadAllModelConfigTables(); }
}

async function applyConfig() {
  const btn = document.getElementById('apply-config-btn');
  btn.textContent = '⏳ 应用中...'; btn.disabled = true;
  const result = await api('/api/config/reload', { method: 'POST' });
  if (result.status === 'ok') {
    bus.emit('config:applied', { reloaded_at: result.reloaded_at });
    btn.classList.remove('pulse-orange'); btn.textContent = '✅ 应用配置';
    refreshConfigStatus();
    alert('配置已生效 (' + result.reloaded_at + ')');
  } else { alert('⚠️ ' + (result.message || '重载失败')); btn.textContent = '🔄 重试'; }
  btn.disabled = false;
}

// ===== 初始化 =====
// Defer initial load until core.js module exports are ready
setTimeout(function boot() {
  if (typeof window.api === 'function') loadFacts();
  else setTimeout(boot, 20);
}, 10);
</script>
