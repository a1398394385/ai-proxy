<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Data Browser</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/facts.css">
<link rel="stylesheet" href="css/tokens.css">
<script type="module" src="js/core.js"></script>
<script type="module" src="js/pages/facts.js"></script>
<script type="module" src="js/pages/tokens.js"></script>
<style>
/* 表格卡片 */
.table-card {
  composes: glass-card;
  overflow: hidden;
  max-width: 100%;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid hsl(var(--border));
}

.table-title {
  font-size: 14px;
  font-weight: 600;
}

.table-scroll {
  overflow-x: auto;
  max-width: 100%;
}

.table-scroll::-webkit-scrollbar {
  height: 6px;
}

.table-scroll::-webkit-scrollbar-track {
  background: hsl(var(--secondary));
}

.table-scroll::-webkit-scrollbar-thumb {
  background: hsl(var(--border));
  border-radius: 3px;
}

.table-scroll::-webkit-scrollbar-thumb:hover {
  background: hsl(var(--muted-foreground));
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 12px 16px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: hsl(var(--secondary));
  border-bottom: 1px solid hsl(var(--border));
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid hsl(var(--border));
  color: hsl(var(--foreground));
}

tr:hover td {
  background: hsl(var(--muted) / 0.5);
}

</style>
</head>
<body>
<div class="app">
  <!-- 导航栏 -->
  <nav class="top-nav">
    <div class="nav-brand">
      <div class="nav-brand-icon">🔬</div>
      <span>Hermes Data Browser</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="facts">
        <span>📋</span> Fact Store
      </button>
      <button class="nav-tab" data-page="tokens">
        <span>📊</span> Token 统计
      </button>
      <button class="nav-tab" data-page="models">
        <span>🔌</span> 模型管理
      </button>
    </div>
    <div class="nav-actions">
      <button class="toolbar-btn" id="settings-btn" title="设置">&#x2699;</button>
      <button class="toolbar-btn" id="theme-toggle">&#x1F319;</button>
    </div>
  </nav>

  <!-- Fact Store 页面 -->
  <div id="page-facts" class="main-content">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search" placeholder="搜索事实内容、标签...">
      </div>
      <div class="filter-pills" id="cat-filters"></div>
      <button class="btn btn-primary" id="add-btn" style="margin-left:auto">
        <span>+</span> 新增事实
      </button>
    </div>
    <div id="facts-container"></div>
  </div>

  <!-- Token 统计页面 -->
  <div id="page-tokens" class="main-content hidden">
    <!-- 周期切换 -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn period-btn" data-period="day">24小时</button>
        <button class="toolbar-btn period-btn active" data-period="week">7天</button>
        <button class="toolbar-btn period-btn" data-period="month">30天</button>
      </div>
      <div class="search-box">
        <input type="text" id="model-search" placeholder="搜索模型...">
      </div>
      <button class="btn btn-secondary" id="refresh-token" style="margin-left:auto">
        <span>🔄</span> 刷新
      </button>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-grid" id="kpi-container">
      <!-- 动态填充 -->
    </div>

    <!-- 图表 -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">📈 使用趋势</span>
        <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="chart-period-label">过去 7 天</span>
      </div>
      <div class="chart-container" id="chart-wrapper">
        <svg class="area-chart" id="trend-chart" preserveAspectRatio="none">
          <defs>
            <linearGradient id="gradientInput" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#3b82f6" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#3b82f6" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientOutput" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#22c55e" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#22c55e" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientCacheRead" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#a855f7" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#a855f7" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientCacheWrite" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#f97316" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#f97316" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- 网格线 -->
          <g id="chart-grid"></g>
          <!-- 路径 -->
          <g id="chart-areas"></g>
          <!-- 坐标轴 -->
          <g id="chart-axes"></g>
          <!-- 鼠标移动竖线 -->
          <line id="chart-cursor-line" x1="0" y1="0" x2="0" y2="100%" stroke="hsl(var(--muted-foreground) / 0.5)" stroke-width="1" stroke-dasharray="4 4" style="display:none; pointer-events:none;"/>
          <!-- 交互区域 -->
          <rect id="chart-overlay" width="100%" height="100%" fill="transparent"/>
        </svg>
        <!-- Tooltip -->
        <div class="chart-tooltip" id="chart-tooltip">
          <div class="tooltip-title" id="tooltip-title"></div>
          <div id="tooltip-content"></div>
        </div>
      </div>
      <!-- 图例 -->
      <div class="chart-legend" id="chart-legend">
        <div class="legend-item" data-series="inputTokens">
          <div class="legend-dot input"></div>
          <span>输入 Tokens</span>
        </div>
        <div class="legend-item" data-series="outputTokens">
          <div class="legend-dot output"></div>
          <span>输出 Tokens</span>
        </div>
        <div class="legend-item" data-series="cacheReadTokens">
          <div class="legend-dot cache-read"></div>
          <span>缓存读取</span>
        </div>
        <div class="legend-item" data-series="cacheWriteTokens">
          <div class="legend-dot cache-write"></div>
          <span>缓存写入</span>
        </div>
        <div class="legend-item" data-series="costLine">
          <div class="legend-dot" style="background:#f43f5e"></div>
          <span>估算成本 (右轴 $)</span>
        </div>
      </div>
    </div>

    <!-- 模型统计表格 -->
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">🧮 按模型统计</span>
        <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="model-count"></span>
      </div>
      <div class="table-scroll">
        <table id="model-table">
          <thead>
            <tr>
              <th>模型</th>
              <th>请求次数</th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--blue));display:inline-block"></span>Input</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--green));display:inline-block"></span>Output</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--orange));display:inline-block"></span>Cache Read</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--purple));display:inline-block"></span>Cache Create</span></th>
              <th>总计</th>
              <th>占比</th>
              <th>成本</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 模型管理页面 -->
  <div id="page-models" class="main-content hidden">
    <div class="config-status-bar" id="config-status" style="display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:16px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:var(--radius);font-size:12px;">
      <span id="status-proxy-indicator" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--red));display:inline-block;"></span>
      <span id="status-proxy-text">检查中...</span>
      <span style="margin-left:auto;color:hsl(var(--muted-foreground))" id="status-counts"></span>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">📡 上游配置</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="upstream-count"></span>
          <button class="btn btn-primary btn-sm" onclick="showUpstreamModal()">+ 新增上游</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="upstream-table">
          <thead><tr><th>状态</th><th>名称</th><th>地址</th><th>超时(s)</th><th>默认</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">🤖 目标模型</span>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="model-filter-upstream" style="padding:4px 8px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));color:hsl(var(--foreground));font-size:12px;"><option value="">全部上游</option></select>
          <button class="btn btn-primary btn-sm" onclick="showModelModal()">+ 新增模型</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="model-table">
          <thead><tr><th>模型名</th><th>所属上游</th><th>Format</th><th>Multimodal</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">🔀 路由映射</span>
        <button class="btn btn-primary btn-sm" onclick="showRouteModal()">+ 新增路由</button>
      </div>
      <div class="table-scroll">
        <table id="route-table">
          <thead><tr><th>源模型</th><th>→ 目标模型</th><th>上游</th><th>状态</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:16px;">
      <button class="btn btn-primary" id="apply-config-btn" onclick="applyConfig()">✅ 应用配置</button>
    </div>
  </div>

  <!-- 设置页面 -->
  <div id="page-settings" class="main-content hidden">
    <div class="settings-container">
      <div class="settings-card">
        <div class="settings-header">
          <span class="settings-title">&#x2699; 通用设置</span>
        </div>
        <div class="settings-body">
          <div class="settings-item">
            <div class="settings-label">
              <span class="settings-label-title">默认页面</span>
              <span class="settings-label-desc">打开网页时默认显示的页面</span>
            </div>
            <select class="settings-select" id="default-page-select">
              <option value="facts">&#x1F4CB; Fact Store</option>
              <option value="tokens">&#x1F4CA; Token 统计</option>
            </select>
          </div>
          <div class="settings-item" style="margin-top: 20px;">
            <div class="settings-label">
              <span class="settings-label-title">默认 Token 周期</span>
              <span class="settings-label-desc">进入 Token 统计时默认显示的时间范围</span>
            </div>
            <select class="settings-select" id="default-period-select">
              <option value="day">24小时</option>
              <option value="week">7天</option>
              <option value="month">30天</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">新增事实</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- 动态填充 -->
    </div>
    <div class="modal-footer" id="modal-footer">
      <!-- 动态填充 -->
    </div>
  </div>
</div>

<script>
// Inline script aliases for module exports (defined in js/core.js)
var currentPage = 'facts';
var allFacts = [];
var activeCategory = null;
var editingId = null;

// Module function references (no fallback — module loads asynchronously, polled in boot)
var api = window.api;
var formatNumber = window.formatNumber;
var formatTokens = window.formatTokens;
var escHtml = window.escHtml;
var showModal = window.showModal;
var closeModal = window.closeModal;
var bus = window.bus;

// Module functions used in DOMContentLoaded handlers (defensive stubs)
var toggleTheme = window.toggleTheme || function() {};
var showSettings = window.showSettings || function() {};
var saveDefaultPage = window.saveDefaultPage || function() {};
var initSettings = window.initSettings || function() {};

// Facts page function aliases (defined in js/pages/facts.js)
var loadFacts = window.loadFacts || function() {};
var loadCategories = window.loadCategories || function() {};
var editFact = window.editFact || function() {};
var saveFact = window.saveFact || function() {};
var deleteFact = window.deleteFact || function() {};
var toggleFactExpand = window.toggleFactExpand || function() {};

// 绑定设置相关事件
document.addEventListener('DOMContentLoaded', () => {
  // 主题切换按钮
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', toggleTheme);
  }
  
  // 设置按钮
  const settingsBtn = document.getElementById('settings-btn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', showSettings);
  }
  
  // 默认页面选择器
  const defaultPageSelect = document.getElementById('default-page-select');
  if (defaultPageSelect) {
    defaultPageSelect.addEventListener('change', (e) => {
      saveDefaultPage(e.target.value);
    });
  }
  
  // 默认周期选择器
  const defaultPeriodSelect = document.getElementById('default-period-select');
  if (defaultPeriodSelect) {
    defaultPeriodSelect.addEventListener('change', (e) => {
      localStorage.setItem('defaultPeriod', e.target.value);
    });
  }
  
  // 初始化设置
  initSettings();
});

// ===== API 调用 =====


// ===== 导航切换 =====
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const page = tab.dataset.page;
    currentPage = page;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-facts').classList.toggle('hidden', page !== 'facts');
    document.getElementById('page-tokens').classList.toggle('hidden', page !== 'tokens');
    document.getElementById('page-models').classList.toggle('hidden', page !== 'models');
    document.getElementById('page-settings').classList.add('hidden');
    if (page === 'facts') window.loadFacts && window.loadFacts();
    if (page === 'tokens') window.loadTokenStats && window.loadTokenStats();
    if (page === 'models') loadModelConfig();
  });
});



// ===== 模态框 =====


document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});

// ===== 模型管理 =====
// escHtml 已在 line 1681 定义，复用



function registerModelEvents() {
  var b = window.bus;
  if (!b || !b.on) return setTimeout(registerModelEvents, 50);
  b.on('config:dirty', () => {
    const btn = document.getElementById('apply-config-btn');
    if (btn) { btn.classList.add('pulse-orange'); btn.textContent = '⚠️ 应用配置'; }
  });
  b.on('config:applied', () => {
    const btn = document.getElementById('apply-config-btn');
    if (btn) { btn.classList.remove('pulse-orange'); btn.textContent = '✅ 应用配置'; }
  });
  b.on('config:upstream-changed', () => { refreshUpstreamDropdown(); refreshConfigStatus(); });
  b.on('config:model-changed', () => { refreshConfigStatus(); });
  b.on('config:route-changed', () => { refreshConfigStatus(); });
}
registerModelEvents();

async function refreshConfigStatus() {
  try {
    const status = await api('/api/config/status');
    const ind = document.getElementById('status-proxy-indicator');
    const txt = document.getElementById('status-proxy-text');
    const cnt = document.getElementById('status-counts');
    if (status.proxy_reachable) {
      ind.style.background = 'hsl(var(--green))'; txt.textContent = 'proxy 在线';
    } else {
      ind.style.background = 'hsl(var(--orange))'; txt.textContent = 'proxy 离线';
    }
    cnt.textContent = status.config_db.upstreams + ' 上游 · ' + status.config_db.models + ' 模型 · ' + status.config_db.routes + ' 路由';
  } catch (e) {}
}

async function loadUpstreamTable() {
  const data = await api('/api/upstreams');
  document.getElementById('upstream-count').textContent = data.upstreams.length + ' 个上游';
  const tbody = document.querySelector('#upstream-table tbody');
  tbody.innerHTML = data.upstreams.map(u =>
    `<tr style="${u.is_active ? '' : 'opacity:0.5'}">
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${u.is_active ? 'hsl(var(--green))' : 'hsl(var(--red))'};"></span> ${u.is_active ? '活跃' : '已禁用'}</td>
      <td><span class="badge badge-blue">${escHtml(u.id)}</span></td>
      <td style="font-family:monospace;font-size:12px">${escHtml(u.base_url)}</td>
      <td>${u.timeout}s</td>
      <td>${u.is_default ? '✅' : ''}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="showUpstreamModal('${escHtml(u.id)}')">编辑</button>
        <button class="btn btn-secondary btn-sm" onclick="testUpstream('${escHtml(u.id)}')">测试</button>
        ${u.is_active ? '<button class="btn btn-danger btn-sm" onclick="confirmDisableUpstream(\'' + escHtml(u.id) + '\')">禁用</button>' : ''}
      </td>
    </tr>`
  ).join('');
}

async function loadModelTable(upstreamId) {
  let url = '/api/models'; if (upstreamId) url += '?upstream_id=' + encodeURIComponent(upstreamId);
  const data = await api(url);
  document.querySelector('#model-table tbody').innerHTML = data.models.map(m =>
    `<tr>
      <td><span class="badge badge-green">${escHtml(m.name)}</span></td>
      <td><span class="badge" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground))">${escHtml(m.upstream_name)}</span></td>
      <td><span class="format-with-tooltip" title="当前所有上游统一使用格式转换，此字段暂不生效">${escHtml(m.format)}</span></td>
      <td>${m.multimodal ? '✅' : '❌'}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="showModelModal(${m.id})">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteModel(${m.id}, '${escHtml(m.name)}')">删除</button>
      </td>
    </tr>`
  ).join('') || '<tr><td colspan="5" class="empty-state">暂无模型</td></tr>';
}

async function loadRouteTable() {
  const data = await api('/api/routes');
  document.querySelector('#route-table tbody').innerHTML = data.routes.map(r =>
    `<tr style="${r.source === '*' ? 'background:hsl(var(--primary) / 0.05);' : ''} ${r.upstream_active ? '' : 'opacity:0.5'}">
      <td><span class="badge badge-purple">${escHtml(r.source)}${r.source === '*' ? ' (★ fallback)' : ''}</span></td>
      <td>→ <span class="badge badge-green">${escHtml(r.target_name)}</span></td>
      <td><span class="badge" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground))">${escHtml(r.upstream_id)}</span></td>
      <td>${r.upstream_active ? '<span style="color:hsl(var(--green))">活跃</span>' : '<span style="color:hsl(var(--red))">上游已禁用</span>'}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="showRouteModal(${r.id})">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteRoute(${r.id}, '${escHtml(r.source)}')">删除</button>
      </td>
    </tr>`
  ).join('') || '<tr><td colspan="5" class="empty-state">暂无路由</td></tr>';
}

document.getElementById('model-filter-upstream').addEventListener('change', (e) => { loadModelTable(e.target.value); });

async function refreshUpstreamDropdown() {
  const data = await api('/api/upstreams');
  const active = data.upstreams.filter(u => u.is_active);
  document.getElementById('model-filter-upstream').innerHTML = '<option value="">全部上游</option>' +
    active.map(u => '<option value="' + escHtml(u.id) + '">' + escHtml(u.id) + '</option>').join('');
}

function loadAllModelConfigTables() {
  loadUpstreamTable();
  loadModelTable(document.getElementById('model-filter-upstream').value);
  loadRouteTable();
}

async function loadModelConfig() {
  await refreshConfigStatus();
  await refreshUpstreamDropdown();
  loadAllModelConfigTables();
}

// ─── 上游模态框 ───
async function showUpstreamModal(editId) {
  let data = { id: '', base_url: '', api_key: '', timeout: 120, connect_timeout: 10, ssl_verify: 1, retry: 1, is_default: 0 };
  let title = '新增上游';
  if (editId) {
    title = '编辑上游: ' + editId;
    const upstreams = await api('/api/upstreams');
    const found = upstreams.upstreams.find(u => u.id === editId);
    if (found) data = found;
  }
  showModal(title,
    `<div class="form-group"><label class="form-label">名称 (ID)</label><input type="text" class="form-input" id="up-id" value="${escHtml(data.id)}" ${editId ? 'readonly' : ''}></div>
     <div class="form-group"><label class="form-label">Base URL</label><input type="text" class="form-input" id="up-url" value="${escHtml(data.base_url)}"></div>
     <div class="form-group"><label class="form-label">API Key</label><input type="text" class="form-input" id="up-key" value="${escHtml(data.api_key)}"></div>
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
       <div class="form-group"><label class="form-label">超时 (s)</label><input type="number" class="form-input" id="up-timeout" value="${data.timeout}" min="1"></div>
       <div class="form-group"><label class="form-label">连接超时 (s)</label><input type="number" class="form-input" id="up-conn-timeout" value="${data.connect_timeout}" min="1"></div>
     </div>
     <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
       <div class="form-group"><label class="form-label">SSL</label><select class="form-input" id="up-ssl"><option value="1" ${data.ssl_verify ? 'selected' : ''}>开启</option><option value="0" ${!data.ssl_verify ? 'selected' : ''}>关闭</option></select></div>
       <div class="form-group"><label class="form-label">重试</label><input type="number" class="form-input" id="up-retry" value="${data.retry}" min="0"></div>
       <div class="form-group"><label class="form-label">默认</label><select class="form-input" id="up-default"><option value="1" ${data.is_default ? 'selected' : ''}>是</option><option value="0" ${!data.is_default ? 'selected' : ''}>否</option></select></div>
     </div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveUpstream('${editId || ''}')">保存</button>`);
}

async function saveUpstream(editId) {
  const data = {
    base_url: document.getElementById('up-url').value,
    api_key: document.getElementById('up-key').value,
    timeout: parseInt(document.getElementById('up-timeout').value) || 120,
    connect_timeout: parseInt(document.getElementById('up-conn-timeout').value) || 10,
    ssl_verify: parseInt(document.getElementById('up-ssl').value),
    retry: parseInt(document.getElementById('up-retry').value) || 1,
    is_default: parseInt(document.getElementById('up-default').value),
  };
  if (!editId) data.id = document.getElementById('up-id').value.trim();
  if (!data.base_url) { alert('Base URL 不能为空'); return; }
  if (editId) {
    await api('/api/upstreams/' + editId, { method: 'PUT', body: JSON.stringify(data) });
  } else {
    await api('/api/upstreams', { method: 'POST', body: JSON.stringify(data) });
  }
  closeModal();
  bus.emit('config:upstream-changed', {});
  bus.emit('config:dirty', { source: 'upstream' });
  loadAllModelConfigTables();
}

async function testUpstream(id) {
  const result = await api('/api/upstreams/' + id + '/test', { method: 'POST' });
  if (result.reachable) {
    alert('✅ 连通正常 (' + result.latency_ms + 'ms)' + (result.warning ? '\n⚠️ ' + result.warning : ''));
  } else {
    alert('❌ 不可达: ' + (result.error || '未知错误'));
  }
}

async function confirmDisableUpstream(id) {
  const data = await api('/api/upstreams');
  const u = data.upstreams.find(x => x.id === id);
  if (!u) return;
  const models = await api('/api/models?upstream_id=' + encodeURIComponent(id));
  const routes = await api('/api/routes');
  const affected = routes.routes.filter(r => r.upstream_id === id);
  const msg = '确认禁用上游 "' + id + '"？\n\n关联模型: ' + models.models.length + ' 个\n活跃路由引用: ' + affected.length + ' 个\n\n禁用后相关路由将无法使用。';
  if (!confirm(msg)) return;
  const result = await api('/api/upstreams/' + id, { method: 'DELETE' });
  if (result.error) {
    alert('❌ 无法禁用: ' + result.error + '\n\n被引用的路由: ' + (result.referenced_routes || []).join(', '));
  } else {
    bus.emit('config:upstream-changed', {});
    bus.emit('config:dirty', { source: 'upstream' });
    loadAllModelConfigTables();
  }
}

// ─── 模型模态框 ───
async function showModelModal(editId) {
  let data = { name: '', upstream_id: '', multimodal: 1, format: 'openai_chat' };
  let title = '新增模型';
  if (editId) {
    title = '编辑模型 #' + editId;
    const models = await api('/api/models');
    const found = models.models.find(m => m.id === editId);
    if (found) data = found;
  }
  const upstreams = await api('/api/upstreams');
  const activeUpstreams = upstreams.upstreams.filter(u => u.is_active);
  const upstreamOpts = activeUpstreams.map(u => '<option value="' + escHtml(u.id) + '" ' + (data.upstream_id === u.id ? 'selected' : '') + '>' + escHtml(u.id) + '</option>').join('');
  showModal(title,
    `<div class="form-group"><label class="form-label">模型名</label><input type="text" class="form-input" id="m-name" value="${escHtml(data.name)}"></div>
     <div class="form-group"><label class="form-label">所属上游</label><select class="form-input" id="m-upstream">${upstreamOpts}</select></div>
     <div class="form-group"><label class="form-label">Format <span title="当前所有上游统一使用格式转换，此字段暂不生效" style="cursor:help;border-bottom:1px dashed">ⓘ</span></label>
       <select class="form-input" id="m-format"><option value="openai_chat" ${data.format === 'openai_chat' ? 'selected' : ''}>openai_chat</option><option value="openai_responses" ${data.format === 'openai_responses' ? 'selected' : ''}>openai_responses</option><option value="anthropic" ${data.format === 'anthropic' ? 'selected' : ''}>anthropic</option></select></div>
     <div class="form-group"><label class="form-label">Multimodal</label><select class="form-input" id="m-multimodal"><option value="1" ${data.multimodal ? 'selected' : ''}>✅ 支持</option><option value="0" ${!data.multimodal ? 'selected' : ''}>❌ 不支持</option></select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveModel(${editId || 0})">保存</button>`);
}

async function saveModel(editId) {
  const data = {
    name: document.getElementById('m-name').value.trim(),
    upstream_id: document.getElementById('m-upstream').value,
    multimodal: parseInt(document.getElementById('m-multimodal').value),
    format: document.getElementById('m-format').value,
  };
  if (!data.name) { alert('模型名不能为空'); return; }
  if (editId) {
    await api('/api/models/' + editId, { method: 'PUT', body: JSON.stringify(data) });
  } else {
    await api('/api/models', { method: 'POST', body: JSON.stringify(data) });
  }
  closeModal();
  bus.emit('config:model-changed', {});
  bus.emit('config:dirty', { source: 'model' });
  loadAllModelConfigTables();
}

async function confirmDeleteModel(id, name) {
  if (!confirm('确认删除模型 "' + name + '"？')) return;
  const result = await api('/api/models/' + id, { method: 'DELETE' });
  if (result.error) {
    alert('❌ 无法删除: ' + result.error + '\n\n被引用的路由: ' + (result.referenced_routes || []).join(', '));
  } else {
    bus.emit('config:model-changed', {});
    bus.emit('config:dirty', { source: 'model' });
    loadAllModelConfigTables();
  }
}

// ─── 路由模态框 ───
async function showRouteModal(editId) {
  let data = { source: '', target_model_id: '' };
  let title = '新增路由';
  if (editId) {
    title = '编辑路由 #' + editId;
    const routes = await api('/api/routes');
    const found = routes.routes.find(r => r.id === editId);
    if (found) data = found;
  }
  const models = await api('/api/models');
  const byUpstream = {};
  models.models.forEach(m => {
    if (!byUpstream[m.upstream_name]) byUpstream[m.upstream_name] = [];
    byUpstream[m.upstream_name].push(m);
  });
  let modelOpts = '';
  for (const [upstream, mlist] of Object.entries(byUpstream)) {
    modelOpts += '<optgroup label="' + escHtml(upstream) + '">';
    mlist.forEach(m => { modelOpts += '<option value="' + m.id + '" ' + (data.target_model_id === m.id ? 'selected' : '') + '>' + escHtml(m.name) + '</option>'; });
    modelOpts += '</optgroup>';
  }
  showModal(title,
    `<div class="form-group"><label class="form-label">源模型名</label><input type="text" class="form-input" id="r-source" value="${escHtml(data.source)}" placeholder="如 gpt-4o 或 * (fallback)"></div>
     <div class="form-group"><label class="form-label">目标模型</label><select class="form-input" id="r-target">${modelOpts}</select></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveRoute(${editId || 0})">保存</button>`);
}

async function saveRoute(editId) {
  const data = {
    source: document.getElementById('r-source').value.trim(),
    target_model_id: parseInt(document.getElementById('r-target').value),
  };
  if (!data.source) { alert('源模型名不能为空'); return; }
  if (editId) {
    await api('/api/routes/' + editId, { method: 'PUT', body: JSON.stringify(data) });
  } else {
    await api('/api/routes', { method: 'POST', body: JSON.stringify(data) });
  }
  closeModal();
  bus.emit('config:route-changed', {});
  bus.emit('config:dirty', { source: 'route' });
  loadAllModelConfigTables();
}

async function confirmDeleteRoute(id, source) {
  if (source === '*') {
    const routes = await api('/api/routes');
    const starCount = routes.routes.filter(r => r.source === '*').length;
    if (starCount <= 1) { alert('❌ 不能删除最后一条 * fallback 路由'); return; }
  }
  if (!confirm('确认删除路由 "' + source + '"？')) return;
  const result = await api('/api/routes/' + id, { method: 'DELETE' });
  if (result.error) { alert('❌ ' + result.error); }
  else { bus.emit('config:route-changed', {}); bus.emit('config:dirty', { source: 'route' }); loadAllModelConfigTables(); }
}

async function applyConfig() {
  const btn = document.getElementById('apply-config-btn');
  btn.textContent = '⏳ 应用中...'; btn.disabled = true;
  const result = await api('/api/config/reload', { method: 'POST' });
  if (result.status === 'ok') {
    bus.emit('config:applied', { reloaded_at: result.reloaded_at });
    btn.classList.remove('pulse-orange'); btn.textContent = '✅ 应用配置';
    refreshConfigStatus();
    alert('配置已生效 (' + result.reloaded_at + ')');
  } else { alert('⚠️ ' + (result.message || '重载失败')); btn.textContent = '🔄 重试'; }
  btn.disabled = false;
}

// ===== 初始化 =====
// Defer initial load until module exports are ready
setTimeout(function boot() {
  if (typeof window.api === 'function' && typeof window.loadFacts === 'function') window.loadFacts();
  else setTimeout(boot, 20);
}, 10);
</script>
</body>
</html>
