<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Data Browser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  /* 暗色模式（默认） */
  --background: 240 5% 8%;
  --foreground: 0 0% 98%;
  --card: 240 5% 12%;
  --card-foreground: 0 0% 98%;
  --primary: 210 100% 54%;
  --primary-foreground: 0 0% 100%;
  --secondary: 240 5% 16%;
  --secondary-foreground: 0 0% 98%;
  --muted: 240 5% 18%;
  --muted-foreground: 240 5% 65%;
  --border: 240 5% 20%;
  --input: 240 5% 24%;
  --ring: 210 100% 54%;
  --radius: 0.75rem;
  
  /* 功能色 */
  --blue: 210 100% 54%;
  --green: 160 60% 45%;
  --orange: 35 90% 55%;
  --purple: 260 70% 60%;
  --red: 0 70% 55%;
  --cyan: 190 80% 50%;
}

/* 亮色模式 */
[data-theme="light"] {
  --background: 0 0% 100%;
  --foreground: 240 10% 3.9%;
  --card: 0 0% 100%;
  --card-foreground: 240 10% 3.9%;
  --primary: 210 100% 54%;
  --primary-foreground: 0 0% 100%;
  --secondary: 240 5% 96%;
  --secondary-foreground: 240 5% 10%;
  --muted: 240 5% 96%;
  --muted-foreground: 240 4% 46%;
  --border: 240 6% 90%;
  --input: 240 6% 90%;
  --ring: 210 100% 54%;
  
  /* 功能色 */
  --blue: 210 100% 50%;
  --green: 160 60% 40%;
  --orange: 35 90% 50%;
  --purple: 260 70% 55%;
  --red: 0 70% 50%;
  --cyan: 190 80% 45%;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* 玻璃卡片 */
.glass-card {
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.glass-card:hover {
  border-color: hsl(var(--primary) / 0.3);
}

/* 布局 */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 顶部导航 */
.top-nav {
  display: flex;
  align-items: center;
  padding: 12px 24px;
  border-bottom: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  font-size: 15px;
  margin-right: 32px;
}

.nav-brand-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, hsl(var(--primary)) 0%, hsl(260 70% 60%) 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tab {
  padding: 8px 16px;
  border-radius: calc(var(--radius) / 2);
  border: none;
  background: transparent;
  color: hsl(var(--muted-foreground));
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-tab:hover {
  color: hsl(var(--foreground));
  background: hsl(var(--muted));
}

.nav-tab.active {
  background: hsl(var(--primary) / 0.15);
  color: hsl(var(--primary));
}

.nav-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

/* 主内容 */
.main-content {
  flex: 1;
  padding: 24px;
  max-width: 1440px;
  margin: 0 auto;
  width: 100%;
}

/* 工具栏 */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 8px;
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  padding: 4px;
}

.toolbar-btn {
  padding: 6px 12px;
  border-radius: calc(var(--radius) / 2);
  border: none;
  background: transparent;
  color: hsl(var(--muted-foreground));
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
}

.toolbar-btn:hover {
  color: hsl(var(--foreground));
  background: hsl(var(--muted));
}

.toolbar-btn.active {
  background: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
}

/* 主题切换按钮 - 玻璃态卡片样式 */
#theme-toggle {
  width: 36px;
  height: 36px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  box-shadow: 0 2px 8px -2px rgba(0, 0, 0, 0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

#theme-toggle:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.2);
  border-color: hsl(var(--primary) / 0.4);
  color: hsl(var(--foreground));
}

.search-box {
  position: relative;
  flex: 1;
  max-width: 320px;
}

.search-box input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  color: hsl(var(--foreground));
  font-size: 13px;
  outline: none;
  transition: all 0.15s ease;
}

.search-box input:focus {
  border-color: hsl(var(--primary) / 0.5);
  box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
}

.search-box input::placeholder {
  color: hsl(var(--muted-foreground));
}

.search-box::before {
  content: "⌕";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: hsl(var(--muted-foreground));
  font-size: 14px;
}

/* KPI 卡片网格 */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  .kpi-grid { grid-template-columns: 1fr; }
}

.kpi-card {
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px -4px rgba(0, 0, 0, 0.2);
  border-color: hsl(var(--primary) / 0.3);
}

.kpi-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.kpi-label {
  font-size: 12px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.kpi-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.kpi-icon.blue { background: hsl(var(--blue) / 0.15); color: hsl(var(--blue)); }
.kpi-icon.green { background: hsl(var(--green) / 0.15); color: hsl(var(--green)); }
.kpi-icon.orange { background: hsl(var(--orange) / 0.15); color: hsl(var(--orange)); }
.kpi-icon.purple { background: hsl(var(--purple) / 0.15); color: hsl(var(--purple)); }
.kpi-icon.cyan { background: hsl(var(--cyan) / 0.15); color: hsl(var(--cyan)); }
.kpi-icon.red { background: hsl(var(--red) / 0.15); color: hsl(var(--red)); }

.kpi-value {
  font-size: 28px;
  font-weight: 700;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

.kpi-value.blue { color: hsl(var(--blue)); }
.kpi-value.green { color: hsl(var(--green)); }
.kpi-value.orange { color: hsl(var(--orange)); }
.kpi-value.purple { color: hsl(var(--purple)); }
.kpi-value.cyan { color: hsl(var(--cyan)); }
.kpi-value.red { color: hsl(var(--red)); }

.kpi-sub {
  font-size: 12px;
  color: hsl(var(--muted-foreground));
}

/* KPI Breakdown - Token 汇总卡片 */
.kpi-breakdown {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid hsl(var(--border));
}

.kpi-breakdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.kpi-breakdown-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.kpi-breakdown-dot.blue { background: hsl(var(--blue)); }
.kpi-breakdown-dot.green { background: hsl(var(--green)); }

.kpi-breakdown-label {
  color: hsl(var(--muted-foreground));
  min-width: 45px;
}

.kpi-breakdown-value {
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  margin-left: auto;
}

.kpi-breakdown-value.blue { color: hsl(var(--blue)); }
.kpi-breakdown-value.green { color: hsl(var(--green)); }

/* KPI Cache - Cache 汇总卡片 */
.kpi-cache-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 8px;
}

.kpi-cache-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: hsl(var(--secondary));
  border-radius: 8px;
  border: 1px solid hsl(var(--border));
}

.kpi-cache-label {
  font-size: 12px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.kpi-cache-value {
  font-size: 16px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.kpi-cache-value.orange { color: hsl(var(--orange)); }
.kpi-cache-value.purple { color: hsl(var(--purple)); }

/* 图表卡片 */
.chart-card {
  composes: glass-card;
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.chart-title {
  font-size: 14px;
  font-weight: 600;
  color: hsl(var(--foreground));
}

.chart-container {
  height: 300px;
  position: relative;
  overflow: hidden;
}

/* SVG 面积图样式 */
.area-chart {
  width: 100%;
  height: 100%;
  display: block;
}

.area-chart-grid {
  stroke: hsl(var(--border));
  stroke-dasharray: 3 3;
  opacity: 0.4;
}

.area-chart-axis {
  stroke: hsl(var(--border));
  opacity: 0.3;
}

.area-chart-tick {
  fill: hsl(var(--muted-foreground));
  font-size: 11px;
  font-family: 'Inter', system-ui, sans-serif;
}

.area-path-input {
  fill: url(#gradientInput);
  stroke: #3b82f6;
  stroke-width: 2;
}

.area-path-output {
  fill: url(#gradientOutput);
  stroke: #22c55e;
  stroke-width: 2;
}

.area-path-cache-read {
  fill: url(#gradientCacheRead);
  stroke: #a855f7;
  stroke-width: 2;
}

.area-path-cache-write {
  fill: url(#gradientCacheWrite);
  stroke: #f97316;
  stroke-width: 2;
}

.area-path-cost {
  fill: none;
  stroke: #f43f5e;
  stroke-width: 2;
}

/* 图例 */
.chart-legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid hsl(var(--border));
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: hsl(var(--muted-foreground));
  cursor: pointer;
  transition: opacity 0.15s ease;
}

.legend-item:hover {
  opacity: 0.8;
}

.legend-item.hidden {
  opacity: 0.4;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.legend-dot.input { background: #3b82f6; }
.legend-dot.output { background: #22c55e; }
.legend-dot.cache-read { background: #a855f7; }
.legend-dot.cache-write { background: #f97316; }

/* Tooltip */
.chart-tooltip {
  position: absolute;
  background: hsl(var(--card) / 0.95);
  border: 1px solid hsl(var(--border));
  border-radius: 8px;
  padding: 12px 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
  z-index: 100;
  min-width: 180px;
}

.chart-tooltip.show {
  opacity: 1;
}

.tooltip-title {
  font-size: 13px;
  font-weight: 600;
  color: hsl(var(--foreground));
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid hsl(var(--border));
}

.tooltip-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  font-size: 12px;
  margin: 4px 0;
}

.tooltip-label {
  display: flex;
  align-items: center;
  gap: 6px;
  color: hsl(var(--muted-foreground));
}

.tooltip-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.tooltip-value {
  font-weight: 600;
  font-family: 'Inter', system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
}

/* 表格卡片 */
.table-card {
  composes: glass-card;
  overflow: hidden;
  max-width: 100%;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid hsl(var(--border));
}

.table-title {
  font-size: 14px;
  font-weight: 600;
}

.table-scroll {
  overflow-x: auto;
  max-width: 100%;
}

.table-scroll::-webkit-scrollbar {
  height: 6px;
}

.table-scroll::-webkit-scrollbar-track {
  background: hsl(var(--secondary));
}

.table-scroll::-webkit-scrollbar-thumb {
  background: hsl(var(--border));
  border-radius: 3px;
}

.table-scroll::-webkit-scrollbar-thumb:hover {
  background: hsl(var(--muted-foreground));
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 12px 16px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: hsl(var(--secondary));
  border-bottom: 1px solid hsl(var(--border));
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid hsl(var(--border));
  color: hsl(var(--foreground));
}

tr:hover td {
  background: hsl(var(--muted) / 0.5);
}

/* 标签 */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}

.badge-blue { background: hsl(var(--blue) / 0.15); color: hsl(var(--blue)); }
.badge-green { background: hsl(var(--green) / 0.15); color: hsl(var(--green)); }
.badge-orange { background: hsl(var(--orange) / 0.15); color: hsl(var(--orange)); }
.badge-purple { background: hsl(var(--purple) / 0.15); color: hsl(var(--purple)); }

/* 进度条 */
.progress-bar {
  display: flex;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  background: hsl(var(--muted));
  margin-top: 8px;
}

.progress-segment {
  height: 100%;
}

.progress-segment.input { background: hsl(var(--blue)); }
.progress-segment.output { background: hsl(var(--green)); }
.progress-segment.cache-read { background: hsl(var(--orange)); }
.progress-segment.cache-write { background: hsl(var(--purple)); }

/* Fact Store 特定样式 */
.fact-card {
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.fact-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px -4px rgba(0, 0, 0, 0.2);
  border-color: hsl(var(--primary) / 0.3);
}

.fact-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.fact-id {
  font-size: 12px;
  font-weight: 600;
  color: hsl(var(--primary));
  font-family: monospace;
  min-width: 50px;
}

.fact-content {
  flex: 1;
  line-height: 1.6;
  color: hsl(var(--foreground));
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 120px;
  overflow: hidden;
  position: relative;
  transition: max-height 0.3s ease;
}

.fact-content.expanded {
  max-height: none;
}

.fact-content.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(transparent, hsl(var(--card)));
  pointer-events: none;
}

.fact-expand-btn {
  margin-top: 8px;
  padding: 4px 12px;
  font-size: 12px;
  color: hsl(var(--primary));
  background: transparent;
  border: 1px solid hsl(var(--border));
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
  align-self: flex-start;
}

.fact-expand-btn:hover {
  background: hsl(var(--primary) / 0.1);
  border-color: hsl(var(--primary) / 0.3);
}

.fact-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.fact-actions {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-secondary {
  background: hsl(var(--secondary));
  color: hsl(var(--foreground));
  border: 1px solid hsl(var(--border));
}

.btn-secondary:hover {
  background: hsl(var(--muted));
  border-color: hsl(var(--primary) / 0.3);
}

.btn-primary {
  background: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
}

.btn-primary:hover {
  background: hsl(var(--primary) / 0.9);
}

.btn-danger {
  background: hsl(var(--red) / 0.15);
  color: hsl(var(--red));
}

.btn-danger:hover {
  background: hsl(var(--red) / 0.25);
}

.btn-sm {
  padding: 4px 10px;
  font-size: 11px;
}

/* 模态框 */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.modal-header {
  padding: 20px;
  border-bottom: 1px solid hsl(var(--border));
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title {
  font-size: 16px;
  font-weight: 600;
}

.modal-close {
  background: none;
  border: none;
  color: hsl(var(--muted-foreground));
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

.modal-close:hover {
  color: hsl(var(--foreground));
}

.modal-body {
  padding: 20px;
}

.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid hsl(var(--border));
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input,
.form-textarea,
.form-select {
  width: 100%;
  padding: 10px 12px;
  background: hsl(var(--secondary));
  border: 1px solid hsl(var(--border));
  border-radius: 8px;
  color: hsl(var(--foreground));
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: all 0.15s ease;
}

.form-input:focus,
.form-textarea:focus,
.form-select:focus {
  border-color: hsl(var(--primary) / 0.5);
  box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
}

.form-textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}

/* 分类过滤器 */
.filter-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;

  background: transparent;
  color: hsl(var(--muted-foreground));
  font-size: 12px;
  font-weight: 500;

  transition: all 0.15s ease;
}

.filter-pill:hover {
  border-color: hsl(var(--primary) / 0.3);

}

.filter-pill.active {
  background: hsl(var(--primary) / 0.15);
  border-color: hsl(var(--primary) / 0.3);
  color: hsl(var(--primary));
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: hsl(var(--muted-foreground));
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.hidden { display: none !important; }

/* 设置页面样式 */
.settings-container {
  max-width: 600px;
  margin: 0 auto;
}

.settings-card {
  background: linear-gradient(145deg, hsl(var(--card)) 0%, hsl(var(--secondary)) 100%);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

}

.settings-header {
  padding: 20px 24px;
  border-bottom: 1px solid hsl(var(--border));
}

.settings-title {
  font-size: 18px;
  font-weight: 600;
  color: hsl(var(--foreground));
}

.settings-body {
  padding: 24px;
}

.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.settings-label {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.settings-label-title {
  font-size: 14px;
  font-weight: 500;
  color: hsl(var(--foreground));
}

.settings-label-desc {
  font-size: 12px;
  color: hsl(var(--muted-foreground));
}

.settings-select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid hsl(var(--border));
  background: hsl(var(--secondary));
  color: hsl(var(--foreground));
  font-size: 14px;

.settings-select:hover {

}

.settings-select:focus {

/* 设置按钮样式 */
#settings-btn {

#settings-btn:hover {

/* 配置状态栏 */

@keyframes pulse-orange {

<script>
// ===== 全局状态 =====
let currentPage = 'facts';
let currentPeriod = 'week';
let allFacts = [];
let allModels = [];
let activeCategory = null;
let editingId = null;

const catLabels = { general: '通用', project: '项目', tool: '工具', user_pref: '偏好' };
const catIcons = { general: '📝', project: '📁', tool: '🔧', user_pref: '✨' };

// ===== 主题切换 =====
function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeButton(savedTheme);
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeButton(newTheme);
}

function updateThemeButton(theme) {
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = theme === 'dark' ? '🌙' : '🌕';
    btn.title = theme === 'dark' ? '切换到亮色模式' : '切换到暗色模式';
  }
}

// 初始化主题
initTheme();

// ===== 设置功能 =====
function initSettings() {
  const savedDefaultPage = localStorage.getItem('defaultPage') || 'facts';
  const pageSelect = document.getElementById('default-page-select');
  if (pageSelect) {
    pageSelect.value = savedDefaultPage;
  }
  
  // 初始化默认周期设置
  const savedDefaultPeriod = localStorage.getItem('defaultPeriod') || 'week';
  const periodSelect = document.getElementById('default-period-select');
  if (periodSelect) {
    periodSelect.value = savedDefaultPeriod;
  }
  // 同步到当前周期
  currentPeriod = savedDefaultPeriod;
  
  // 更新周期按钮的活动状态
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.period === savedDefaultPeriod);
  });
  
  // 应用默认页面
  applyDefaultPage(savedDefaultPage);
}

function applyDefaultPage(page) {
  if (!page || (page !== 'facts' && page !== 'tokens')) {
    page = 'facts';
  }
  
  currentPage = page;
  
  // 更新导航标签状态
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.page === page);
  });
  
  // 显示/隐藏页面
  document.getElementById('page-facts').classList.toggle('hidden', page !== 'facts');
  document.getElementById('page-tokens').classList.toggle('hidden', page !== 'tokens');
  document.getElementById('page-settings').classList.add('hidden');
  
  // 加载数据
  if (page === 'facts') loadFacts();
  if (page === 'tokens') loadTokenStats();
}

function showSettings() {
  currentPage = 'settings';
  
  // 隐藏所有主页面
  document.getElementById('page-facts').classList.add('hidden');
  document.getElementById('page-tokens').classList.add('hidden');
  document.getElementById('page-settings').classList.remove('hidden');
  
  // 移除导航标签的活动状态
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
}

function saveDefaultPage(page) {
  localStorage.setItem('defaultPage', page);
}

// 绑定设置相关事件
document.addEventListener('DOMContentLoaded', () => {
  // 主题切换按钮
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', toggleTheme);
  }
  
  // 设置按钮
  const settingsBtn = document.getElementById('settings-btn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', showSettings);
  }
  
  // 默认页面选择器
  const defaultPageSelect = document.getElementById('default-page-select');
  if (defaultPageSelect) {
    defaultPageSelect.addEventListener('change', (e) => {
      saveDefaultPage(e.target.value);
    });
  }
  
  // 默认周期选择器
  const defaultPeriodSelect = document.getElementById('default-period-select');
  if (defaultPeriodSelect) {
    defaultPeriodSelect.addEventListener('change', (e) => {
      localStorage.setItem('defaultPeriod', e.target.value);
    });
  }
  
  // 初始化设置
  initSettings();
});

// ===== API 调用 =====
async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

function formatNumber(n) {
  if (n == null || n === undefined) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function formatTokens(n) {
  return n.toLocaleString();
}

// ===== 导航切换 =====
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const page = tab.dataset.page;
    currentPage = page;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-facts').classList.toggle('hidden', page !== 'facts');
    document.getElementById('page-tokens').classList.toggle('hidden', page !== 'tokens');
    document.getElementById('page-settings').classList.add('hidden');
    if (page === 'facts') loadFacts();
    if (page === 'tokens') loadTokenStats();
  });
});

// ===== Fact Store =====
async function loadFacts(q) {
  let url = q ? `/api/facts?q=${encodeURIComponent(q)}` : '/api/facts';
  if (activeCategory && !q) url += `?category=${activeCategory}`;
  const data = await api(url);
  allFacts = data.facts || [];
  renderFacts(allFacts);
  if (!q && !activeCategory) loadCategories();
}

async function loadCategories() {
  const data = await api('/api/categories');
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = data.categories.map(c => {
    const label = catLabels[c.category] || c.category;
    const icon = catIcons[c.category] || '📌';
    return `<button class="filter-pill ${activeCategory === c.category ? 'active' : ''}" data-cat="${c.category}">${icon} ${label} (${c.count})</button>`;
  }).join('');
  wrap.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      if (activeCategory === cat) { activeCategory = null; }
      else { activeCategory = cat; }
      loadCategories();
      loadFacts();
    });
  });
}

function renderFacts(facts) {
  const c = document.getElementById('facts-container');
  if (!facts.length) { 
    c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>没有找到事实</p></div>'; 
    return; 
  }
  c.innerHTML = facts.map(f => {
    const catLabel = catLabels[f.category] || f.category;
    const catIcon = catIcons[f.category] || '📌';
    const trustPct = Math.round(f.trust_score * 100);
    const trustColor = trustPct >= 70 ? 'var(--green)' : trustPct >= 40 ? 'var(--orange)' : 'var(--red)';
    const entitiesHtml = (f.entities || []).map(e => `<span class="badge badge-blue">${e}</span>`).join(' ');
    const tagsHtml = f.tags ? f.tags.split(',').filter(Boolean).map(t => `<span class="badge" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground))">${t.trim()}</span>`).join(' ') : '';
    
    // 检测内容是否需要折叠（超过 5 行或 300 字符，与 CSS max-height: 120px 匹配）
    const content = f.content || '';
    const lineCount = content.split('\n').length;
    const charCount = content.length;
    // 按 1.6 行高、13px 字体计算，120px 约 5-6 行
    const needsExpand = lineCount > 5 || charCount > 300;
    const contentClass = needsExpand ? 'fact-content collapsed' : 'fact-content';
    const expandBtn = needsExpand ? `<button class="fact-expand-btn" onclick="toggleFactExpand(this)">展开 ▼</button>` : '';
    
    return `<div class="fact-card">
      <div class="fact-header">
        <span class="fact-id">#${f.fact_id}</span>
        <div style="flex:1;display:flex;flex-direction:column;min-width:0">
          <div class="${contentClass}" data-expanded="false">${escHtml(content)}</div>
          ${expandBtn}
        </div>
        <div class="fact-actions">
          <button class="btn btn-secondary btn-sm" onclick="editFact(${f.fact_id})">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteFact(${f.fact_id})">删除</button>
        </div>
      </div>
      <div class="fact-meta">
        <span class="badge badge-purple">${catIcon} ${catLabel}</span>
        ${tagsHtml}
        ${entitiesHtml}
        <span style="margin-left:auto;font-size:12px;color:hsl(var(--muted-foreground));display:flex;align-items:center;gap:6px">
          信任度
          <span style="display:inline-block;width:60px;height:4px;background:hsl(var(--muted));border-radius:2px;overflow:hidden">
            <span style="display:block;width:${trustPct}%;height:100%;background:hsl(${trustColor})"></span>
          </span>
          ${trustPct}%
        </span>
      </div>
    </div>`;
  }).join('');
}

// 展开/折叠 Fact 内容
function toggleFactExpand(btn) {
  const content = btn.previousElementSibling;
  const isExpanded = content.getAttribute('data-expanded') === 'true';
  
  if (isExpanded) {
    content.classList.remove('expanded');
    content.classList.add('collapsed');
    content.setAttribute('data-expanded', 'false');
    btn.textContent = '展开 ▼';
  } else {
    content.classList.remove('collapsed');
    content.classList.add('expanded');
    content.setAttribute('data-expanded', 'true');
    btn.textContent = '收起 ▲';
  }
}

function escHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ===== SVG 面积图实现 =====
let chartData = [];
let hiddenSeries = new Set();

function renderTrendChart(trends) {
  chartData = trends || [];
  if (!chartData.length) {
    document.getElementById('chart-areas').innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="hsl(var(--muted-foreground))">暂无数据</text>';
    return;
  }

  const svg = document.getElementById('trend-chart');
  const wrapper = document.getElementById('chart-wrapper');
  const width = wrapper.clientWidth;
  const height = wrapper.clientHeight;
  
  // 设置 SVG 视图框
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  
  // 边距
  const margin = { top: 10, right: 60, bottom: 30, left: 50 };
  const chartWidth = width - margin.left - margin.right;
  const chartHeight = height - margin.top - margin.bottom;
  
  // 向上取整到最接近的整数刻度
  function niceMax(max, ticks = 5) {
    if (max === 0) return 1;
    if (max < 10) return 10;
    const exponent = Math.floor(Math.log10(max));
    const fraction = max / Math.pow(10, exponent);
    let niceFraction;
    if (fraction <= 1.2) niceFraction = 1.2;
    else if (fraction <= 1.5) niceFraction = 1.5;
    else if (fraction <= 2) niceFraction = 2;
    else if (fraction <= 3) niceFraction = 3;
    else if (fraction <= 5) niceFraction = 5;
    else if (fraction <= 7) niceFraction = 7;
    else niceFraction = 10;
    return niceFraction * Math.pow(10, exponent);
  }

  // 使用各系列各自最大值（非堆叠）作为 Y 轴上界
  const maxIndividual = Math.max(
    ...chartData.map(d => Math.max(
      hiddenSeries.has('inputTokens')    ? 0 : (d.input_tokens      || 0),
      hiddenSeries.has('outputTokens')   ? 0 : (d.output_tokens     || 0),
      hiddenSeries.has('cacheReadTokens')  ? 0 : (d.cache_read_tokens  || 0),
      hiddenSeries.has('cacheWriteTokens') ? 0 : (d.cache_write_tokens || 0)
    )),
    1
  );
  const yMax = niceMax(maxIndividual);
  const yTicks = 5;
  
  // 绘制网格线
  const gridGroup = document.getElementById('chart-grid');
  gridGroup.innerHTML = '';
  for (let i = 0; i <= yTicks; i++) {
    const y = margin.top + (chartHeight * i / yTicks);
    const value = Math.round(yMax * (1 - i / yTicks));
    
    // 水平网格线
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', margin.left);
    line.setAttribute('y1', y);
    line.setAttribute('x2', width - margin.right);
    line.setAttribute('y2', y);
    line.setAttribute('class', 'area-chart-grid');
    gridGroup.appendChild(line);
  }
  
  // 绘制坐标轴
  const axesGroup = document.getElementById('chart-axes');
  axesGroup.innerHTML = '';
  
  // Y 轴标签（格式化为 k/M 格式）
  function formatAxisValue(value) {
    if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
    if (value >= 1000) return (value / 1000).toFixed(0) + 'k';
    return value.toString();
  }
  
  for (let i = 0; i <= yTicks; i++) {
    const y = margin.top + (chartHeight * i / yTicks);
    const value = Math.round(yMax * (1 - i / yTicks));
    
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', margin.left - 10);
    text.setAttribute('y', y + 4);
    text.setAttribute('text-anchor', 'end');
    text.setAttribute('class', 'area-chart-tick');
    text.textContent = formatAxisValue(value);
    axesGroup.appendChild(text);
  }

  // 右侧 Y 轴：成本（USD）
  const costValues = chartData.map(d => d.estimated_cost_usd || 0);
  const costYMax = niceMax(Math.max(...costValues, 0.0001));

  function formatCostAxis(v) {
    if (v === 0) return '$0';
    if (v >= 10)  return '$' + v.toFixed(1);
    if (v >= 1)   return '$' + v.toFixed(2);
    if (v >= 0.1) return '$' + v.toFixed(3);
    return '$' + v.toFixed(4);
  }

  // 右轴分隔线
  const rightLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  rightLine.setAttribute('x1', width - margin.right);
  rightLine.setAttribute('y1', margin.top);
  rightLine.setAttribute('x2', width - margin.right);
  rightLine.setAttribute('y2', margin.top + chartHeight);
  rightLine.setAttribute('class', 'area-chart-axis');
  axesGroup.appendChild(rightLine);

  // 右轴刻度标签
  for (let i = 0; i <= yTicks; i++) {
    const y = margin.top + (chartHeight * i / yTicks);
    const value = costYMax * (1 - i / yTicks);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', width - margin.right + 8);
    t.setAttribute('y', y + 4);
    t.setAttribute('text-anchor', 'start');
    t.setAttribute('class', 'area-chart-tick');
    t.setAttribute('fill', '#f43f5e');
    t.textContent = formatCostAxis(value);
    axesGroup.appendChild(t);
  }

  // X 轴标签 - 根据固定数量的数据点分布
  const xStep = chartWidth / (chartData.length - 1 || 1);
  const dataCount = chartData.length;
  
  let labelInterval;
  let labelFormatter;
  
  if (dataCount === 24) {
    // 24小时模式: 每个小时都显示标签，只显示时间（去掉日期）
    labelInterval = 1;
    labelFormatter = (d, i) => {
      // d.date 格式: "2026-04-22 11:31"
      const parts = d.date.split(' ');
      if (parts.length === 2) {
        return parts[1]; // 只返回 "11:31"
      }
      return d.date;
    };
  } else if (dataCount === 7) {
    // 7天模式: 每天都显示
    labelInterval = 1;
    labelFormatter = (d) => d.date.slice(5); // MM-DD
  } else if (dataCount === 30) {
    // 30天模式: 每5天显示一个标签
    labelInterval = 5;
    labelFormatter = (d) => d.date.slice(5); // MM-DD
  } else {
    // 其他情况自动计算
    labelInterval = Math.ceil(dataCount / 7);
    labelFormatter = (d) => d.date.slice(5);
  }
  
  chartData.forEach((d, i) => {
    // 对24小时模式，固定间隔显示标签，不过滤数据区域
    if (dataCount === 24) {
      if (i % labelInterval !== 0 && i !== dataCount - 1) {
        return;
      }
    }
    
    if (dataCount !== 24 && i % labelInterval !== 0 && i !== dataCount - 1) {
      return;
    }
    
    const x = margin.left + i * xStep;
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    
    // 对于最右侧的标签，调整位置避免截断
    let textAnchor = 'middle';
    let labelX = x;
    if (i === dataCount - 1) {
      // 最右侧标签往左偏移，防止截断
      labelX = Math.min(x, width - margin.right - 5);
      textAnchor = 'end';
    } else if (i === 0) {
      // 最左侧标签往右偏移
      textAnchor = 'start';
      labelX = Math.max(x, margin.left + 5);
    }
    
    text.setAttribute('x', labelX);
    text.setAttribute('y', height - 10);
    text.setAttribute('text-anchor', textAnchor);
    text.setAttribute('class', 'area-chart-tick');
    const label = labelFormatter(d, i);
    if (label) {
      text.textContent = label;
      axesGroup.appendChild(text);
    }
  });
  
  // 绘制面积路径（重叠式：每条系列从基线到自身值，最大系列先画确保在后面）
  const areasGroup = document.getElementById('chart-areas');
  areasGroup.innerHTML = '';

  const series = [
    { key: 'inputTokens',    label: '输入 Tokens', color: '#3b82f6', gradient: 'url(#gradientInput)',      class: 'area-path-input',       rawKey: 'input_tokens'       },
    { key: 'outputTokens',   label: '输出 Tokens', color: '#22c55e', gradient: 'url(#gradientOutput)',     class: 'area-path-output',      rawKey: 'output_tokens'      },
    { key: 'cacheReadTokens',  label: '缓存读取',  color: '#a855f7', gradient: 'url(#gradientCacheRead)',  class: 'area-path-cache-read',  rawKey: 'cache_read_tokens'  },
    { key: 'cacheWriteTokens', label: '缓存写入',  color: '#f97316', gradient: 'url(#gradientCacheWrite)', class: 'area-path-cache-write', rawKey: 'cache_write_tokens' }
  ];

  const chartBottom = margin.top + chartHeight;

  series.forEach((s) => {
    if (hiddenSeries.has(s.key)) return;

    const points = chartData.map((d, i) => {
      const x = margin.left + i * xStep;
      const value = d[s.rawKey] || 0;
      const y = margin.top + chartHeight * (1 - value / yMax);
      return { x, y };
    });

    // 构建路径: 顶部曲线 (左到右) → 右下角基线 → 左下角基线 → 闭合
    let pathD = '';
    points.forEach((p, i) => {
      if (i === 0) {
        pathD += `M ${p.x} ${p.y}`;
      } else {
        const prev = points[i - 1];
        const cpX = (prev.x + p.x) / 2;
        pathD += ` C ${cpX} ${prev.y}, ${cpX} ${p.y}, ${p.x} ${p.y}`;
      }
    });

    const last = points[points.length - 1];
    pathD += ` L ${last.x} ${chartBottom} L ${points[0].x} ${chartBottom} Z`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathD);
    path.setAttribute('class', s.class);
    path.setAttribute('fill', s.gradient);
    areasGroup.appendChild(path);
  });

  // 绘制成本折线（使用右侧 Y 轴刻度）
  if (!hiddenSeries.has('costLine')) {
    const costPoints = chartData.map((d, i) => ({
      x: margin.left + i * xStep,
      y: margin.top + chartHeight * (1 - (d.estimated_cost_usd || 0) / costYMax)
    }));
    let costD = '';
    costPoints.forEach((p, i) => {
      if (i === 0) {
        costD += `M ${p.x} ${p.y}`;
      } else {
        const prev = costPoints[i - 1];
        const cpX = (prev.x + p.x) / 2;
        costD += ` C ${cpX} ${prev.y}, ${cpX} ${p.y}, ${p.x} ${p.y}`;
      }
    });
    const costPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    costPath.setAttribute('d', costD);
    costPath.setAttribute('class', 'area-path-cost');
    areasGroup.appendChild(costPath);
  }

  // 图例交互
  document.querySelectorAll('.legend-item').forEach(item => {
    item.classList.toggle('hidden', hiddenSeries.has(item.dataset.series));
  });
  
  // 悬停交互
  const overlay = document.getElementById('chart-overlay');
  const tooltip = document.getElementById('chart-tooltip');
  const cursorLine = document.getElementById('chart-cursor-line');
  
  overlay.onmousemove = (e) => {
    const rect = svg.getBoundingClientRect();
    const x = e.clientX - rect.left - margin.left;
    const index = Math.round(x / xStep);
    
    if (index >= 0 && index < chartData.length) {
      const d = chartData[index];
      // 计算对齐到数据点的x坐标
      const pointX = margin.left + index * xStep;
      // 更新竖线位置
      cursorLine.setAttribute('x1', pointX);
      cursorLine.setAttribute('x2', pointX);
      cursorLine.style.display = 'block';
      showTooltip(e.clientX, e.clientY, d);
    }
  };
  
  overlay.onmouseleave = () => {
    tooltip.classList.remove('show');
    cursorLine.style.display = 'none';
  };
}

function showTooltip(mouseX, mouseY, data) {
  const tooltip = document.getElementById('chart-tooltip');
  const title = document.getElementById('tooltip-title');
  const content = document.getElementById('tooltip-content');
  
  // 根据数据格式判断显示方式
  const dataCount = chartData.length;
  if (dataCount === 24) {
    // 24小时模式: 显示完整日期时间 MM-DD HH:mm
    title.textContent = data.date; // 如 "2026-04-21 14:00"
  } else if (dataCount === 7 || dataCount === 30) {
    title.textContent = data.date; // 7天/30天模式: 显示日期
  } else {
    title.textContent = data.date;
  }
  
  const items = [
    { label: '输入 Tokens', value: data.input_tokens, color: '#3b82f6', key: 'inputTokens' },
    { label: '输出 Tokens', value: data.output_tokens, color: '#22c55e', key: 'outputTokens' },
    { label: '缓存读取', value: data.cache_read_tokens, color: '#a855f7', key: 'cacheReadTokens' },
    { label: '缓存写入', value: data.cache_write_tokens, color: '#f97316', key: 'cacheWriteTokens' },
    { label: '成本', value: '$' + data.estimated_cost_usd.toFixed(4), color: '#f43f5e', bold: true }
  ];
  
  content.innerHTML = items.filter(item => !item.key || !hiddenSeries.has(item.key)).map(item => `
    <div class="tooltip-row">
      <div class="tooltip-label">
        <div class="tooltip-dot" style="background:${item.color}"></div>
        <span>${item.label}</span>
      </div>
      <span class="tooltip-value" style="color:${item.bold ? 'hsl(var(--foreground))' : ''}">${typeof item.value === 'number' ? item.value.toLocaleString() : item.value}</span>
    </div>
  `).join('');
  
  // 定位 tooltip
  const rect = document.getElementById('chart-wrapper').getBoundingClientRect();
  let left = mouseX - rect.left + 15;
  let top = mouseY - rect.top - 10;

  // 先渲染出来，再读取实际尺寸
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.classList.add('show');

  // 水平边界：右侧放不下则翻到左边
  const tipW = tooltip.offsetWidth;
  if (left + tipW > rect.width) left = mouseX - rect.left - tipW - 15;
  // 垂直边界：底部放不下则翻到鼠标上方
  const tipH = tooltip.offsetHeight;
  if (top + tipH > rect.height) top = mouseY - rect.top - tipH - 10;
  // 防止超出顶部
  if (top < 0) top = 4;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function renderModelTable(models) {
  const filter = document.getElementById('model-search').value.toLowerCase();
  const filtered = filter ? models.filter(m => m.model.toLowerCase().includes(filter)) : models;
  
  document.getElementById('model-count').textContent = `${filtered.length} 个模型`;
  
  const totalTokens = filtered.reduce((sum, m) => sum + m.total_tokens, 0) || 1;
  const tbody = document.querySelector('#model-table tbody');
  
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">没有找到模型</td></tr>';
    return;
  }
  
  tbody.innerHTML = filtered.map(m => {
    const pct = ((m.total_tokens / totalTokens) * 100).toFixed(1);
    return `<tr>
      <td><span class="badge badge-blue">${m.model}</span></td>
      <td>${(m.request_count || 0).toLocaleString()}</td>
      <td>${formatTokens(m.input_tokens)}</td>
      <td>${formatTokens(m.output_tokens)}</td>
      <td>${formatTokens(m.cache_read_tokens)}</td>
      <td>${formatTokens(m.cache_write_tokens)}</td>
      <td><b>${formatTokens(m.total_tokens)}</b></td>
      <td style="min-width:120px">
        ${pct}%
        <div class="progress-bar">
          <div class="progress-segment input" style="width:${(m.input_tokens/totalTokens*100)}%"></div>
          <div class="progress-segment output" style="width:${(m.output_tokens/totalTokens*100)}%"></div>
          <div class="progress-segment cache-read" style="width:${(m.cache_read_tokens/totalTokens*100)}%"></div>
          <div class="progress-segment cache-write" style="width:${(m.cache_write_tokens/totalTokens*100)}%"></div>
        </div>
      </td>
      <td style="color:hsl(var(--red));font-weight:500">$${m.estimated_cost_usd.toFixed(4)}</td>
    </tr>`;
  }).join('');
}

document.getElementById('model-search').addEventListener('input', () => {
  renderModelTable(allModels);
});

// ===== 模态框 =====
function showModal(title, content, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = content;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  editingId = null;
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});

// ===== Fact CRUD =====
document.getElementById('add-btn').addEventListener('click', () => {
  editingId = null;
  showModal('新增事实', `
    <div class="form-group">
      <label class="form-label">内容</label>
      <textarea class="form-textarea" id="m-content" placeholder="输入事实内容..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">类别</label>
      <select class="form-select" id="m-category">
        <option value="general">通用</option>
        <option value="project">项目</option>
        <option value="tool">工具</option>
        <option value="user_pref">偏好</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">标签 (逗号分隔)</label>
      <input type="text" class="form-input" id="m-tags" placeholder="tag1, tag2">
    </div>
    <div class="form-group">
      <label class="form-label">信任度 (0-1)</label>
      <input type="number" class="form-input" id="m-trust" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div class="form-group">
      <label class="form-label">实体 (逗号分隔)</label>
      <input type="text" class="form-input" id="m-entities" placeholder="entity1, entity2">
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveFact()">保存</button>
  `);
});

async function editFact(id) {
  const f = allFacts.find(x => x.fact_id === id) || await api(`/api/facts/${id}`);
  editingId = id;
  showModal(`编辑事实 #${id}`, `
    <div class="form-group">
      <label class="form-label">内容</label>
      <textarea class="form-textarea" id="m-content">${escHtml(f.content)}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">类别</label>
      <select class="form-select" id="m-category">
        <option value="general" ${f.category==='general'?'selected':''}>通用</option>
        <option value="project" ${f.category==='project'?'selected':''}>项目</option>
        <option value="tool" ${f.category==='tool'?'selected':''}>工具</option>
        <option value="user_pref" ${f.category==='user_pref'?'selected':''}>偏好</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">标签 (逗号分隔)</label>
      <input type="text" class="form-input" id="m-tags" value="${escHtml(f.tags||'')}">
    </div>
    <div class="form-group">
      <label class="form-label">信任度 (0-1)</label>
      <input type="number" class="form-input" id="m-trust" min="0" max="1" step="0.1" value="${f.trust_score}">
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveFact()">保存</button>
  `);
}

async function saveFact() {
  const data = {
    content: document.getElementById('m-content').value,
    category: document.getElementById('m-category').value,
    tags: document.getElementById('m-tags').value,
    trust_score: parseFloat(document.getElementById('m-trust').value) || 0.5,
  };
  if (!data.content.trim()) { alert('内容不能为空'); return; }
  const entitiesInput = document.getElementById('m-entities');
  if (entitiesInput) data.entities = entitiesInput.value.split(',').map(s=>s.trim()).filter(Boolean);
  
  if (editingId) {
    await api(`/api/facts/${editingId}`, { method: 'PUT', body: JSON.stringify(data) });
  } else {
    await api('/api/facts', { method: 'POST', body: JSON.stringify(data) });
  }
  closeModal();
  loadFacts(); loadCategories();
}

async function deleteFact(id) {
  if (!confirm('确认删除事实 #' + id + '?')) return;
  await api(`/api/facts/${id}`, { method: 'DELETE' });
  loadFacts(); loadCategories();
}

// ===== 搜索 =====
document.getElementById('search').addEventListener('input', e => {
  loadFacts(e.target.value.trim());
});

// ===== 初始化 =====
loadFacts();
</script>
</body>
