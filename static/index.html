<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Data Browser</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/facts.css">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/models.css">
</head>
<body>
<div class="app">
  <!-- 导航栏 -->
  <nav class="top-nav">
    <div class="nav-brand">
      <div class="nav-brand-icon">🔬</div>
      <span>Hermes Data Browser</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="facts">
        <span>📋</span> Fact Store
      </button>
      <button class="nav-tab" data-page="tokens">
        <span>📊</span> Token 统计
      </button>
      <button class="nav-tab" data-page="models">
        <span>🔌</span> 模型管理
      </button>
    </div>
    <div class="nav-actions">
      <button class="toolbar-btn" id="settings-btn" title="设置">&#x2699;</button>
      <button class="toolbar-btn" id="theme-toggle">&#x1F319;</button>
    </div>
  </nav>

  <!-- Fact Store 页面 -->
  <div id="page-facts" class="main-content">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search" placeholder="搜索事实内容、标签...">
      </div>
      <div class="filter-pills" id="cat-filters"></div>
      <button class="btn btn-primary" id="add-btn" style="margin-left:auto">
        <span>+</span> 新增事实
      </button>
    </div>
    <div id="facts-container"></div>
  </div>

  <!-- Token 统计页面 -->
  <div id="page-tokens" class="main-content hidden">
    <!-- 周期切换 -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn period-btn" data-period="day">24小时</button>
        <button class="toolbar-btn period-btn active" data-period="week">7天</button>
        <button class="toolbar-btn period-btn" data-period="month">30天</button>
      </div>
      <div class="search-box">
        <input type="text" id="model-search" placeholder="搜索模型...">
      </div>
      <button class="btn btn-secondary" id="refresh-token" style="margin-left:auto">
        <span>🔄</span> 刷新
      </button>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-grid" id="kpi-container">
      <!-- 动态填充 -->
    </div>

    <!-- 图表 -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">📈 使用趋势</span>
        <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="chart-period-label">过去 7 天</span>
      </div>
      <div class="chart-container" id="chart-wrapper">
        <svg class="area-chart" id="trend-chart" preserveAspectRatio="none">
          <defs>
            <linearGradient id="gradientInput" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#3b82f6" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#3b82f6" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientOutput" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#22c55e" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#22c55e" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientCacheRead" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#a855f7" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#a855f7" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradientCacheWrite" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="#f97316" stop-opacity="0.3"/>
              <stop offset="95%" stop-color="#f97316" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- 网格线 -->
          <g id="chart-grid"></g>
          <!-- 路径 -->
          <g id="chart-areas"></g>
          <!-- 坐标轴 -->
          <g id="chart-axes"></g>
          <!-- 鼠标移动竖线 -->
          <line id="chart-cursor-line" x1="0" y1="0" x2="0" y2="100%" stroke="hsl(var(--muted-foreground) / 0.5)" stroke-width="1" stroke-dasharray="4 4" style="display:none; pointer-events:none;"/>
          <!-- 交互区域 -->
          <rect id="chart-overlay" width="100%" height="100%" fill="transparent"/>
        </svg>
        <!-- Tooltip -->
        <div class="chart-tooltip" id="chart-tooltip">
          <div class="tooltip-title" id="tooltip-title"></div>
          <div id="tooltip-content"></div>
        </div>
      </div>
      <!-- 图例 -->
      <div class="chart-legend" id="chart-legend">
        <div class="legend-item" data-series="inputTokens">
          <div class="legend-dot input"></div>
          <span>输入 Tokens</span>
        </div>
        <div class="legend-item" data-series="outputTokens">
          <div class="legend-dot output"></div>
          <span>输出 Tokens</span>
        </div>
        <div class="legend-item" data-series="cacheReadTokens">
          <div class="legend-dot cache-read"></div>
          <span>缓存读取</span>
        </div>
        <div class="legend-item" data-series="cacheWriteTokens">
          <div class="legend-dot cache-write"></div>
          <span>缓存写入</span>
        </div>
        <div class="legend-item" data-series="costLine">
          <div class="legend-dot" style="background:#f43f5e"></div>
          <span>估算成本 (右轴 $)</span>
        </div>
      </div>
    </div>

    <!-- 模型统计表格 -->
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">🧮 按模型统计</span>
        <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="model-count"></span>
      </div>
      <div class="table-scroll">
        <table id="model-table">
          <thead>
            <tr>
              <th>模型</th>
              <th>请求次数</th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--blue));display:inline-block"></span>Input</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--green));display:inline-block"></span>Output</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--orange));display:inline-block"></span>Cache Read</span></th>
              <th><span style="display:inline-flex;align-items:center;gap:4px"><span class="color-dot" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--purple));display:inline-block"></span>Cache Create</span></th>
              <th>总计</th>
              <th>占比</th>
              <th>成本</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 模型管理页面 -->
  <div id="page-models" class="main-content hidden">
    <div class="config-status-bar" id="config-status" style="display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:16px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:var(--radius);font-size:12px;">
      <span id="status-proxy-indicator" style="width:8px;height:8px;border-radius:50%;background:hsl(var(--red));display:inline-block;"></span>
      <span id="status-proxy-text">检查中...</span>
      <span style="margin-left:auto;color:hsl(var(--muted-foreground))" id="status-counts"></span>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">📡 上游配置</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:hsl(var(--muted-foreground))" id="upstream-count"></span>
          <button class="btn btn-primary btn-sm" onclick="showUpstreamModal()">+ 新增上游</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="upstream-table">
          <thead><tr><th>状态</th><th>名称</th><th>地址</th><th>超时(s)</th><th>默认</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">🤖 目标模型</span>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="model-filter-upstream" style="padding:4px 8px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));color:hsl(var(--foreground));font-size:12px;"><option value="">全部上游</option></select>
          <button class="btn btn-primary btn-sm" onclick="showModelModal()">+ 新增模型</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="model-table">
          <thead><tr><th>模型名</th><th>所属上游</th><th>Format</th><th>Multimodal</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <span class="table-title">🔀 路由映射</span>
        <button class="btn btn-primary btn-sm" onclick="showRouteModal()">+ 新增路由</button>
      </div>
      <div class="table-scroll">
        <table id="route-table">
          <thead><tr><th>源模型</th><th>→ 目标模型</th><th>上游</th><th>状态</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:16px;">
      <button class="btn btn-primary" id="apply-config-btn" onclick="applyConfig()">✅ 应用配置</button>
    </div>
  </div>

  <!-- 设置页面 -->
  <div id="page-settings" class="main-content hidden">
    <div class="settings-container">
      <div class="settings-card">
        <div class="settings-header">
          <span class="settings-title">&#x2699; 通用设置</span>
        </div>
        <div class="settings-body">
          <div class="settings-item">
            <div class="settings-label">
              <span class="settings-label-title">默认页面</span>
              <span class="settings-label-desc">打开网页时默认显示的页面</span>
            </div>
            <select class="settings-select" id="default-page-select">
              <option value="facts">&#x1F4CB; Fact Store</option>
              <option value="tokens">&#x1F4CA; Token 统计</option>
            </select>
          </div>
          <div class="settings-item" style="margin-top: 20px;">
            <div class="settings-label">
              <span class="settings-label-title">默认 Token 周期</span>
              <span class="settings-label-desc">进入 Token 统计时默认显示的时间范围</span>
            </div>
            <select class="settings-select" id="default-period-select">
              <option value="day">24小时</option>
              <option value="week">7天</option>
              <option value="month">30天</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">新增事实</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- 动态填充 -->
    </div>
    <div class="modal-footer" id="modal-footer">
      <!-- 动态填充 -->
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
